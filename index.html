<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>🍑 桃气紫账本 | 语音记账版</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js">
    </script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #7a73b0;
            --primary-light: #f3f2fa;
            --primary-soft: #d3cfe5;
            --primary-dark: #5e5694;
            --expense: #ff9aa2;
            --expense-dark: #e56b73;
            --income: #b5ead7;
            --income-dark: #43aa8b;
            --bg: linear-gradient(135deg, #f5f3ff 0%, #e8e7f5 100%);
            --text: #4a4563;
            --text-light: #7f7999;
            --card-white: rgba(255, 255, 255, 0.95);
            --shadow-sm: 0 8px 20px rgba(122, 115, 176, 0.1);
            --shadow-md: 0 12px 28px rgba(122, 115, 176, 0.12);
            --shadow-lg: 0 20px 40px rgba(122, 115, 176, 0.15);
        }

        body {
            background: var(--bg);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, sans-serif;
            padding: 20px;
            color: var(--text);
            min-height: 100vh;
        }

        .container {
            max-width: 1280px;
            margin: 0 auto;
        }

        .header-bar {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            gap: 12px;
        }

        h1 {
            margin: 0;
            font-size: 24px;
            background: linear-gradient(135deg, #7a73b0 0%, #9b8bcb 50%, #b8a9e0 100%);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            font-weight: 800;
            letter-spacing: -0.5px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        h1::before {
            content: "🍑";
            font-size: 28px;
            background: none;
            -webkit-background-clip: unset;
            color: #7a73b0;
        }

        .btn-group {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .btn {
            border: none;
            padding: 8px 14px;
            border-radius: 100px;
            font-weight: 600;
            font-size: 12px;
            cursor: pointer;
            background: white;
            transition: all 0.25s ease;
            box-shadow: var(--shadow-sm);
        }

        .btn-success {
            background: linear-gradient(135deg, #fff 0%, #f8f7ff 100%);
            border: 1.5px solid var(--primary-soft);
            color: var(--primary);
        }

        .btn-success:hover {
            background: var(--primary);
            border-color: var(--primary);
            color: white;
            transform: translateY(-2px);
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            color: white;
            box-shadow: 0 4px 12px rgba(122, 115, 176, 0.35);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
        }

        .btn-danger {
            border: 1.5px solid var(--expense);
            background: white;
            color: var(--expense-dark);
        }

        .btn-danger:hover {
            background: var(--expense);
            border-color: var(--expense);
            color: white;
        }

        .btn-voice {
            background: linear-gradient(135deg, #a78bfa 0%, #8b5cf6 100%);
            color: white;
            border: none;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .btn-voice:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(139, 92, 246, 0.4);
        }

        .btn-voice.listening {
            animation: pulse 1.5s infinite;
            background: linear-gradient(135deg, #ef4444 0%, #dc2626 100%);
        }

        .btn-import {
            background: linear-gradient(135deg, #f59e0b 0%, #d97706 100%);
            color: white;
        }

        .btn-import:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(245, 158, 11, 0.4);
        }

        @keyframes pulse {
            0% {
                transform: scale(1);
                opacity: 1;
            }
            50% {
                transform: scale(1.05);
                opacity: 0.9;
            }
            100% {
                transform: scale(1);
                opacity: 1;
            }
        }

        .dashboard {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 14px;
            margin-bottom: 24px;
        }

        .card {
            background: var(--card-white);
            backdrop-filter: blur(10px);
            border-radius: 28px;
            padding: 14px 10px;
            box-shadow: var(--shadow-sm);
            text-align: center;
            transition: all 0.3s ease;
            border: 1px solid rgba(255, 255, 255, 0.6);
        }

        .card:hover {
            transform: translateY(-3px);
            box-shadow: var(--shadow-md);
        }

        .card h3 {
            font-size: 11px;
            color: var(--text-light);
            margin-bottom: 8px;
            font-weight: 600;
        }

        .card p {
            font-size: 18px;
            font-weight: 800;
            margin: 0;
            background: linear-gradient(135deg, var(--text) 0%, var(--primary) 100%);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }

        @media (max-width: 480px) {
            body {
                padding: 14px;
            }
            .card p {
                font-size: 15px;
            }
            .card h3 {
                font-size: 10px;
            }
            .dashboard {
                gap: 10px;
            }
            .btn {
                padding: 6px 10px;
                font-size: 10px;
            }
        }

        .grid-layout {
            display: grid;
            grid-template-columns: 340px 1fr 340px;
            gap: 20px;
        }

        @media (max-width: 1000px) {
            .grid-layout {
                grid-template-columns: 1fr;
                gap: 18px;
            }
        }

        .box {
            background: var(--card-white);
            backdrop-filter: blur(10px);
            border-radius: 32px;
            padding: 20px;
            box-shadow: var(--shadow-sm);
            border: 1px solid rgba(255, 255, 255, 0.5);
        }

        h2 {
            font-size: 16px;
            font-weight: 700;
            color: var(--primary);
            margin-bottom: 18px;
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            padding-bottom: 8px;
            border-bottom: 2px dashed var(--primary-soft);
        }

        h2::before {
            content: "🌸";
            font-size: 18px;
        }

        .form-group {
            margin-bottom: 14px;
        }

        .form-group label {
            font-size: 11px;
            font-weight: 700;
            color: var(--text-light);
            display: block;
            margin-bottom: 6px;
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 11px 14px;
            background: var(--primary-light);
            border: 2px solid transparent;
            border-radius: 20px;
            font-size: 14px;
            color: var(--text);
            outline: none;
            transition: all 0.2s ease;
            font-family: inherit;
        }

        .form-group textarea {
            resize: vertical;
            min-height: 60px;
            max-height: 120px;
        }

        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            background: white;
            border-color: var(--primary-soft);
            box-shadow: 0 0 0 3px rgba(122, 115, 176, 0.1);
        }

        .voice-area {
            background: linear-gradient(135deg, var(--primary-light) 0%, #faf9ff 100%);
            border-radius: 24px;
            padding: 12px 16px;
            margin-bottom: 16px;
            text-align: center;
            border: 1px dashed var(--primary-soft);
        }

        .voice-hint {
            font-size: 11px;
            color: var(--text-light);
            margin-top: 8px;
        }

        .voice-result {
            font-size: 13px;
            color: var(--primary-dark);
            margin-top: 8px;
            padding: 6px 10px;
            background: rgba(122, 115, 176, 0.1);
            border-radius: 16px;
            word-break: break-all;
        }

        .list-container {
            max-height: 380px;
            overflow-y: auto;
            padding-right: 6px;
        }

        .list-container::-webkit-scrollbar {
            width: 5px;
        }

        .list-container::-webkit-scrollbar-track {
            background: var(--primary-light);
            border-radius: 10px;
        }

        .list-container::-webkit-scrollbar-thumb {
            background: var(--primary-soft);
            border-radius: 10px;
        }

        .item {
            background: linear-gradient(135deg, var(--primary-light) 0%, #faf9ff 100%);
            border-radius: 20px;
            padding: 12px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            flex-wrap: wrap;
            transition: all 0.2s ease;
            border: 1px solid rgba(255, 255, 255, 0.8);
        }

        .item:hover {
            transform: translateX(3px);
            box-shadow: var(--shadow-sm);
        }

        .item-left {
            flex: 1;
            min-width: 60%;
        }

        .item-right {
            text-align: right;
            min-width: 80px;
        }

        .cate-tag {
            background: linear-gradient(135deg, #e0dbff 0%, #d4cdf5 100%);
            color: var(--primary-dark);
            font-size: 10px;
            font-weight: 800;
            padding: 4px 12px;
            border-radius: 30px;
            display: inline-block;
            margin-right: 8px;
        }

        .sub-tag {
            background: white;
            padding: 4px 10px;
            border-radius: 30px;
            font-size: 10px;
            font-weight: 600;
            color: var(--text-light);
        }

        .meta-info {
            font-size: 10px;
            color: var(--text-light);
            margin-top: 6px;
        }

        .remark-display {
            font-size: 11px;
            color: var(--text);
            background: rgba(122, 115, 176, 0.08);
            padding: 4px 10px;
            border-radius: 12px;
            margin-top: 4px;
            display: inline-block;
            max-width: 100%;
            word-break: break-all;
        }

        .amt {
            font-weight: 800;
            font-size: 16px;
        }

        .amt.EXPENSE {
            color: var(--expense-dark);
        }
        .amt.INCOME {
            color: var(--income-dark);
        }

        .del-icon {
            cursor: pointer;
            font-size: 11px;
            font-weight: 700;
            color: var(--expense-dark);
            background: rgba(255, 154, 162, 0.15);
            display: inline-block;
            padding: 4px 12px;
            border-radius: 30px;
            margin-top: 6px;
            transition: all 0.2s ease;
        }

        .del-icon:hover {
            background: var(--expense);
            color: white;
        }

        .config-list {
            background: var(--primary-light);
            border-radius: 20px;
            padding: 10px;
            max-height: 160px;
            overflow-y: auto;
            margin-bottom: 14px;
        }

        .config-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 8px;
            border-bottom: 1px dashed rgba(205, 200, 224, 0.5);
            font-weight: 600;
            font-size: 12px;
        }

        .config-item:last-child {
            border-bottom: none;
        }

        .del-btn {
            background: rgba(255, 230, 230, 0.8);
            border-radius: 30px;
            width: 26px;
            height: 26px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: var(--expense-dark);
            font-weight: 800;
        }

        .del-btn:hover {
            background: var(--expense);
            color: white;
        }

        .inline-flex {
            display: flex;
            gap: 10px;
            margin-top: 12px;
        }

        .inline-flex input {
            flex: 1;
            padding: 9px 12px;
            font-size: 12px;
            background: var(--primary-light);
            border: none;
            border-radius: 18px;
            outline: none;
        }

        .inline-flex input:focus {
            background: white;
            box-shadow: 0 0 0 2px var(--primary-soft);
        }

        .chart-wrapper {
            background: linear-gradient(135deg, var(--primary-light) 0%, #faf9ff 100%);
            border-radius: 24px;
            padding: 14px;
            margin-top: 18px;
        }

        .collapsible-content {
            display: none;
            margin-top: 14px;
        }

        .toast {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%);
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            color: white;
            padding: 12px 24px;
            border-radius: 100px;
            font-size: 13px;
            font-weight: 600;
            z-index: 1000;
            animation: fadeInOut 2.5s ease;
            box-shadow: var(--shadow-lg);
            max-width: 90%;
        }

        @keyframes fadeInOut {
            0% {
                opacity: 0;
                transform: translateX(-50%) translateY(30px);
            }
            15% {
                opacity: 1;
                transform: translateX(-50%) translateY(0);
            }
            85% {
                opacity: 1;
                transform: translateX(-50%) translateY(0);
            }
            100% {
                opacity: 0;
                transform: translateX(-50%) translateY(-20px);
            }
        }

        .sync-status {
            font-size: 11px;
            margin-top: 12px;
            padding: 10px;
            border-radius: 20px;
            text-align: center;
            font-weight: 600;
        }

        .sync-status.success {
            background: linear-gradient(135deg, #e8f5e9 0%, #c8e6d9 100%);
            color: #2e7d32;
        }
        .sync-status.error {
            background: linear-gradient(135deg, #ffebee 0%, #ffcdd2 100%);
            color: #c62828;
        }
        .sync-status.syncing {
            background: linear-gradient(135deg, #fff3e0 0%, #ffe0b2 100%);
            color: #ef6c00;
        }

        .device-info {
            background: linear-gradient(135deg, var(--primary-light) 0%, #f0edf8 100%);
            border-radius: 20px;
            padding: 12px;
            margin-top: 16px;
            font-size: 10px;
            color: var(--text-light);
        }

        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: var(--text-light);
        }

        .empty-state::before {
            content: "🍃";
            font-size: 48px;
            display: block;
            margin-bottom: 12px;
            opacity: 0.6;
        }

        .import-area {
            background: linear-gradient(135deg, #fef3c7 0%, #fde68a 100%);
            border-radius: 20px;
            padding: 16px;
            margin-bottom: 16px;
            border: 2px dashed #f59e0b;
            text-align: center;
        }

        .import-area .btn {
            margin: 4px;
        }

        .file-input-wrapper {
            position: relative;
            overflow: hidden;
            display: inline-block;
        }

        .file-input-wrapper input[type=file] {
            position: absolute;
            left: 0;
            top: 0;
            opacity: 0;
            width: 100%;
            height: 100%;
            cursor: pointer;
        }

        .remark-badge {
            display: inline-block;
            background: rgba(122, 115, 176, 0.12);
            color: var(--text);
            font-size: 10px;
            padding: 2px 10px;
            border-radius: 12px;
            margin-top: 4px;
            max-width: 200px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        @media (max-width: 480px) {
            .remark-badge {
                max-width: 120px;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="header-bar">
            <h1>缘の流水帐</h1>
            <div class="btn-group">
                <button class="btn btn-success" id="pullBtn">📥 拉取</button>
                <button class="btn btn-primary" id="pushBtn">📤 推送</button>
                <button class="btn btn-success" id="exportBtn">📎 导出</button>
                <button class="btn btn-import" id="importBtn">📂 导入</button>
                <button class="btn btn-danger" id="resetBtn">🔄 重置</button>
            </div>
        </div>

        <div class="dashboard">
            <div class="card"><h3>✨ 总资产净值</h3><p id="netAsset">¥0.00</p></div>
            <div class="card"><h3>💰 收入总额</h3><p id="totalIncome">¥0.00</p></div>
            <div class="card"><h3>💸 支出总额</h3><p id="totalExpense">¥0.00</p></div>
        </div>

        <div class="grid-layout">
            <div class="box">
                <h2>🎤 语音记账</h2>
                <div class="voice-area">
                    <button class="btn btn-voice" id="voiceBtn" style="width:100%; justify-content:center;">
                        🎙️ 点击开始语音记账
                    </button>
                    <div class="voice-hint">
                        💡 试试说："今天吃饭花了68元" 或 "工资收入5000元"
                    </div>
                    <div id="voiceResult" class="voice-result" style="display:none;"></div>
                </div>

                <h2>📝 手动记账</h2>
                <form id="ledgerForm">
                    <div class="form-group">
                        <label>📌 收支类型</label>
                        <select id="txType">
                            <option value="EXPENSE">🌸 支出</option>
                            <option value="INCOME">💰 收入</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>💰 金额 (¥)</label>
                        <input type="number" id="txAmount" step="0.01" placeholder="0.00" required>
                    </div>
                    <div class="form-group">
                        <label>📂 一级分类</label>
                        <select id="txPrimaryCate"></select>
                    </div>
                    <div class="form-group">
                        <label>🏷️ 二级分类</label>
                        <select id="txSubCate"></select>
                    </div>
                    <div class="form-group">
                        <label>🏦 支付账户</label>
                        <select id="txAccount"></select>
                    </div>
                    <div class="form-group">
                        <label>📅 日期</label>
                        <input type="date" id="txDate" required>
                    </div>
                    <div class="form-group">
                        <label>📝 备注（可填写详细说明）</label>
                        <textarea id="txRemark" placeholder="记录更多细节...&#10;例如：和谁一起、在哪消费、具体项目等" rows="2"></textarea>
                    </div>
                    <button type="submit" class="btn btn-primary" style="width:100%">✨ 一键封印 ✨</button>
                </form>
            </div>

            <div class="box">
                <h2>📖 流水日记本</h2>
                <div class="list-container" id="historyList"></div>
                <div class="chart-wrapper">
                    <canvas id="analyticsChart" height="130"></canvas>
                </div>
            </div>

            <div class="box">
                <div class="import-area" id="importArea">
                    <h2 style="border-bottom: none; margin-bottom: 8px; justify-content: center;">📂 导入数据</h2>
                    <p style="font-size: 12px; color: #92400e; margin-bottom: 12px;">
                        支持导入之前导出的CSV文件，将合并到当前账本
                    </p>
                    <div class="file-input-wrapper">
                        <button class="btn btn-import">📤 选择CSV文件导入</button>
                        <input type="file" id="fileInput" accept=".csv">
                    </div>
                    <div id="importStatus" style="font-size: 11px; margin-top: 8px; color: var(--text-light);"></div>
                </div>

                <h2>🏦 账户管家</h2>
                <div class="config-list" id="accountConfigList"></div>
                <div class="inline-flex">
                    <input type="text" id="newAccountName" placeholder="新账户名">
                    <input type="number" id="newAccountInit" placeholder="初始余额" style="width:75px;">
                    <button class="btn btn-primary" onclick="addCustomAccount()">+</button>
                </div>

                <h2 style="margin-top: 20px;">🗂️ 自定分类</h2>
                <div class="form-group">
                    <select id="configType">
                        <option value="EXPENSE">📉 支出分类</option>
                        <option value="INCOME">📈 收入分类</option>
                    </select>
                </div>
                <div class="config-list" id="cateConfigList"></div>
                <div class="inline-flex">
                    <input type="text" id="newPrimaryName" placeholder="新主类名">
                    <button class="btn btn-primary" onclick="addPrimaryCategory()">➕主类</button>
                </div>
                <div class="inline-flex">
                    <select id="configPrimarySelect" style="flex:2;"></select>
                    <input type="text" id="newSubName" placeholder="子类名称" style="flex:2;">
                    <button class="btn btn-primary" onclick="addSubCategory()">+子类</button>
                </div>

                <h2 style="margin-top: 20px;" onclick="toggleSyncPanel()">☁️ GitHub同步 ⏷</h2>
                <div id="syncPanel" class="collapsible-content">
                    <div class="form-group">
                        <label>GitHub 用户名</label>
                        <input type="text" id="ghUser" placeholder="octocat">
                    </div>
                    <div class="form-group">
                        <label>仓库名</label>
                        <input type="text" id="ghRepo" placeholder="purple-ledger">
                    </div>
                    <div class="form-group">
                        <label>🔑 Token</label>
                        <input type="password" id="ghToken" placeholder="ghp_xxxx">
                    </div>
                    <p style="font-size: 11px; color: var(--text-light); line-height: 1.5;">
                        💡 提示：<br>
                        1. 需要先在GitHub创建仓库<br>
                        2. Token需要选经典令牌，勾选repo权限<br>
                        3. 拉取=从云端下载，推送=上传到云端
                    </p>
                    <div id="syncStatus" class="sync-status"></div>
                    <div class="device-info" id="deviceInfo">
                        <p>📱 正在检测设备信息...</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ========== 预设数据（包含新增账户和分类） ==========
        let storage = JSON.parse(localStorage.getItem('gh_ledger_data_v3')) || {
            accounts: [
                { name: "💳 微信支付", balance: 0 },
                { name: "💳 支付宝", balance: 0 },
                { name: "🏦 建行储蓄卡", balance: 0 },
                { name: "💳 招行信用卡", balance: 0 },
                { name: "🏦 招行储蓄卡", balance: 0 },
                { name: "💰 现金", balance: 0 },
                { name: "🏦 其他账户", balance: 0 }
            ],
            categories: {
                EXPENSE: {

        // ========== 导入功能 ==========
        function importCSV(file) {
            const reader = new FileReader();
            const statusDiv = document.getElementById('importStatus');

            reader.onload = function(e) {
                try {
                    const text = e.target.result;
                    const lines = text.split('\n').filter(line => line.trim());

                    if (lines.length < 2) {
                        statusDiv.textContent = '❌ 文件格式错误：没有数据行';
                        statusDiv.style.color = 'var(--expense-dark)';
                        return;
                    }

                    const header = lines[0].split(',').map(h => h.replace(/^"|"$/g, '').trim());
                    const requiredHeaders = ['ID', '日期', '类型', '主分类', '子分类', '账户', '金额', '备注'];
                    const hasAllRequired = requiredHeaders.every(h => header.includes(h));

                    if (!hasAllRequired) {
                        statusDiv.textContent = '❌ 文件格式不匹配，请导入由本工具导出的CSV文件';
                        statusDiv.style.color = 'var(--expense-dark)';
                        return;
                    }

                    const idIdx = header.indexOf('ID');
                    const dateIdx = header.indexOf('日期');
                    const typeIdx = header.indexOf('类型');
                    const primaryIdx = header.indexOf('主分类');
                    const subIdx = header.indexOf('子分类');
                    const accountIdx = header.indexOf('账户');
                    const amountIdx = header.indexOf('金额');
                    const remarkIdx = header.indexOf('备注');

                    let importedCount = 0;
                    let duplicateCount = 0;

                    const existingIds = new Set(storage.transactions.map(t => t.id));

                    for (let i = 1; i < lines.length; i++) {
                        let line = lines[i];
                        const values = line.split(',').map(v => v.replace(/^"|"$/g, '').trim());

                        if (values.length < 8) continue;

                        const id = values[idIdx] || ('import_' + Date.now() + '_' + i);

                        if (existingIds.has(id)) {
                            duplicateCount++;
                            continue;
                        }

                        const date = values[dateIdx] || new Date().toISOString().split('T')[0];
                        const type = values[typeIdx] === '收入' ? 'INCOME' : 'EXPENSE';
                        const primaryCate = values[primaryIdx] || (type === 'INCOME' ? '💼 工资收入' : '🍜 餐饮美食');
                        const subCate = values[subIdx] || '日常';
                        let account = values[accountIdx] || '💳 微信支付';

                        if (!account.includes('💳') && !account.includes('🏦') && !account.includes('💰')) {
                            if (account.includes('微信') || account.includes('支付')) account = '💳 ' + account;
                            else if (account.includes('支付宝')) account = '💳 ' + account;
                            else if (account.includes('现金')) account = '💰 ' + account;
                            else if (account.includes('银行') || account.includes('储蓄') || account.includes('信用') || account
                                .includes('建行') || account.includes('招行')) account = '🏦 ' + account;
                            else account = '🏦 ' + account;
                        }

                        const amount = parseFloat(values[amountIdx]) || 0;
                        const remark = values[remarkIdx] || '📥 从CSV导入';

                        if (amount <= 0) continue;

                        if (!storage.accounts.find(a => a.name === account)) {
                            storage.accounts.push({ name: account, balance: 0 });
                        }

                        if (!storage.categories[type]) storage.categories[type] = {};
                        if (!storage.categories[type][primaryCate]) {
                            storage.categories[type][primaryCate] = [];
                        }
                        if (!storage.categories[type][primaryCate].includes(subCate)) {
                            storage.categories[type][primaryCate].push(subCate);
                        }

                        const newTx = {
                            id: id,
                            type: type,
                            amount: amount,
                            primaryCate: primaryCate,
                            subCate: subCate,
                            account: account,
                            date: date,
                            remark: remark,
                            createdAt: Date.now() - (importedCount * 1000),
                            imported: true
                        };

                        storage.transactions.push(newTx);
                        existingIds.add(id);
                        importedCount++;
                    }

                    persist();
                    refreshAll();

                    let msg = `✅ 导入成功！新增 ${importedCount} 条记录`;
                    if (duplicateCount > 0) msg += `，跳过 ${duplicateCount} 条重复记录`;
                    statusDiv.textContent = msg;
                    statusDiv.style.color = 'var(--income-dark)';
                    showToast(`📂 导入完成！新增 ${importedCount} 条记录`);

                } catch (error) {
                    console.error('导入错误:', error);
                    statusDiv.textContent = '❌ 导入失败：' + error.message;
                    statusDiv.style.color = 'var(--expense-dark)';
                    showToast('导入失败：' + error.message, true);
                }
            };

            reader.onerror = function() {
                statusDiv.textContent = '❌ 读取文件失败';
                statusDiv.style.color = 'var(--expense-dark)';
            };

            reader.readAsText(file, 'UTF-8');
        }

        // ========== 语音识别 ==========
        function initSpeechRecognition() {
            if (!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) {
                document.getElementById('voiceBtn').disabled = true;
                document.getElementById('voiceBtn').textContent = '🎙️ 浏览器不支持语音';
                document.getElementById('voiceBtn').style.opacity = '0.5';
                showToast("当前浏览器不支持语音识别，请使用Chrome或Safari", true);
                return false;
            }

            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            recognition = new SpeechRecognition();
            recognition.continuous = false;
            recognition.interimResults = false;
            recognition.lang = 'zh-CN';

            recognition.onstart = function() {
                isListening = true;
                const voiceBtn = document.getElementById('voiceBtn');
                voiceBtn.textContent = '🔴 正在聆听... 点击停止';
                voiceBtn.classList.add('listening');
                showToast("🎤 请开始说话...");
            };

            recognition.onend = function() {
                isListening = false;
                const voiceBtn = document.getElementById('voiceBtn');
                voiceBtn.textContent = '🎙️ 点击开始语音记账';
                voiceBtn.classList.remove('listening');
            };

            recognition.onresult = function(event) {
                const text = event.results[0][0].transcript;
                document.getElementById('voiceResult').style.display = 'block';
                document.getElementById('voiceResult').innerHTML = `📝 识别结果: "${text}"<br>🔄 正在解析...`;
                parseVoiceCommand(text);
            };

            recognition.onerror = function(event) {
                console.error('语音识别错误:', event.error);
                showToast("语音识别失败: " + event.error, true);
                const voiceBtn = document.getElementById('voiceBtn');
                voiceBtn.textContent = '🎙️ 点击开始语音记账';
                voiceBtn.classList.remove('listening');
                isListening = false;
            };

            return true;
        }

        function parseVoiceCommand(text) {
            let type = null;
            let amount = null;
            let category = null;
            let remark = text;

            const incomeKeywords = ['收入', '赚了', '收到', '工资', '奖金', '红包', '入账', '+'];
            const expenseKeywords = ['支出', '花了', '消费', '买了', '吃饭', '购物', '付款', '付了', '-'];

            for (let kw of incomeKeywords) {
                if (text.includes(kw)) {
                    type = 'INCOME';
                    break;
                }
            }
            if (!type) {
                for (let kw of expenseKeywords) {
                    if (text.includes(kw)) {
                        type = 'EXPENSE';
                        break;
                    }
                }
            }

            const amountPatterns = [
                /(\d+(?:\.\d+)?)元/,
                /(\d+(?:\.\d+)?)块钱/,
                /(\d+(?:\.\d+)?)块/,
                /花了(\d+(?:\.\d+)?)/,
                /支出(\d+(?:\.\d+)?)/,
                /收入(\d+(?:\.\d+)?)/,
                /赚了(\d+(?:\.\d+)?)/,
                /(\d+(?:\.\d+)?)元/
            ];

            for (let pattern of amountPatterns) {
                const match = text.match(pattern);
                if (match) {
                    amount = parseFloat(match[1]);
                    break;
                }
            }

            if (!amount) {
                const numberMatch = text.match(/(\d+(?:\.\d+)?)/);
                if (numberMatch && !text.includes('电话') && !text.includes('号码')) {
                    amount = parseFloat(numberMatch[1]);
                }
            }

            const categoryMap = {
                '🍜 餐饮美食': ['吃饭', '午餐', '晚餐', '早餐', '外卖', '奶茶', '火锅', '烧烤', '美食', '餐厅', '食堂'],
                '🎬 休闲娱乐': ['电影', '游戏', '娱乐', '唱歌', 'KTV', '游玩', '旅行', '旅游', '门票'],
                '🛍️ 购物消费': ['购物', '衣服', '鞋', '包', '数码', '日用品', '超市'],
                '🚗 交通出行': ['打车', '公交', '地铁', '加油', '停车'],
                '🏠 生活缴费': ['水电', '燃气', '物业费', '话费', '网费'],
                '💼 工资收入': ['工资', '月薪', '绩效', '奖金'],
                '💼 兼职外快': ['兼职', '外快', '副业', '设计', '稿费', '项目'],
                '🎁 生活福利': ['红包', '福利', '补贴', '返利']
            };

            for (let [cate, keywords] of Object.entries(categoryMap)) {
                for (let kw of keywords) {
                    if (text.includes(kw)) {
                        category = cate;
                        break;
                    }
                }
                if (category) break;
            }

            const resultDiv = document.getElementById('voiceResult');
            if (type && amount && amount > 0) {
                const typeText = type === 'INCOME' ? '收入' : '支出';
                const categoryText = category || (type === 'INCOME' ? '💼 工资收入' : '🍜 餐饮美食');
                resultDiv.innerHTML =
                    `✅ 解析完成！<br>📌 ${typeText} ¥${amount.toFixed(2)}<br>📂 ${categoryText}<br>📝 "${remark}"<br>⏳ 3秒后自动保存...`;

                setTimeout(() => {
                    autoSaveVoiceTransaction(type, amount, categoryText, remark);
                }, 3000);
            } else {
                resultDiv.innerHTML =
                    `⚠️ 未能完整解析<br>识别文字: "${text}"<br>请尝试说: "吃饭花了50元" 或 "工资收入5000元"`;
                setTimeout(() => {
                    resultDiv.style.display = 'none';
                }, 4000);
            }
        }

        function autoSaveVoiceTransaction(type, amount, primaryCate, remark) {
            const subList = storage.categories[type]?.[primaryCate] || [];
            const subCate = subList.length > 0 ? subList[0] : '日常';

            const defaultAccount = storage.accounts.length > 0 ? storage.accounts[0].name : '💳 微信支付';

            const newTx = {
                id: 'tx_' + Date.now() + '_' + Math.random().toString(36).substr(2, 6),
                type: type,
                amount: amount,
                primaryCate: primaryCate,
                subCate: subCate,
                account: defaultAccount,
                date: new Date().toISOString().split('T')[0],
                remark: remark || '🎤 语音记账',
                createdAt: Date.now(),
            };

            storage.transactions.unshift(newTx);
            persist();
            refreshAll();
            showToast(`🎤 语音记账成功！${type === 'INCOME' ? '+' : '-'}¥${amount.toFixed(2)}`);

            const resultDiv = document.getElementById('voiceResult');
            resultDiv.innerHTML = `🎉 已保存！${type === 'INCOME' ? '+' : '-'}¥${amount.toFixed(2)} - ${primaryCate}`;
            setTimeout(() => {
                resultDiv.style.display = 'none';
            }, 2000);
        }

        function toggleVoiceRecognition() {
            if (!recognition) {
                if (!initSpeechRecognition()) return;
            }

            if (isListening) {
                recognition.stop();
            } else {
                try {
                    recognition.start();
                } catch (e) {
                    showToast("请允许麦克风权限后重试", true);
                    initSpeechRecognition();
                }
            }
        }

        function utf8ToBase64(str) {
            try {
                return btoa(encodeURIComponent(str).replace(/%([0-9A-F]{2})/g, function(match, p1) {
                    return String.fromCharCode(parseInt(p1, 16));
                }));
            } catch (e) { return ''; }
        }

        function base64ToUtf8(base64) {
            try {
                return decodeURIComponent(Array.prototype.map.call(atob(base64), function(c) {
                    return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2);
                }).join(''));
            } catch (e) { return ''; }
        }

        function showToast(message, isError = false) {
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.textContent = message;
            toast.style.background = isError ? 'linear-gradient(135deg, var(--expense) 0%, var(--expense-dark) 100%)' :
                'linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%)';
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 2500);
        }

        function showSyncStatus(message, type) {
            const statusDiv = document.getElementById('syncStatus');
            if (statusDiv) {
                statusDiv.textContent = message;
                statusDiv.className = `sync-status ${type}`;
                setTimeout(() => {
                    if (statusDiv.textContent === message) {
                        statusDiv.className = 'sync-status';
                        statusDiv.textContent = '';
                    }
                }, 4000);
            }
        }

        function persist() { localStorage.setItem('gh_ledger_data_v3', JSON.stringify(storage)); }

        function recalcAccountBalances() {
            storage.accounts.forEach(acc => { acc.balance = 0; });
            let sortedTx = [...storage.transactions].sort((a, b) => new Date(a.date) - new Date(b.date));
            sortedTx.forEach(t => {
                let account = storage.accounts.find(a => a.name === t.account);
                if (account) {
                    if (t.type === 'INCOME') account.balance += t.amount;
                    else account.balance -= t.amount;
                }
            });
            persist();
        }

        function renderTransactionsAndDashboard() {
            let incomeSum = 0,
                expenseSum = 0;
            let chartAgg = {};
            let html = '';

            recalcAccountBalances();
            let totalNet = storage.accounts.reduce((sum, acc) => sum + acc.balance, 0);

            const txs = [...storage.transactions].sort((a, b) => new Date(b.date) - new Date(a.date));

            if (txs.length === 0) {
                html = '<div class="empty-state">暂无流水，记一笔吧～</div>';
            } else {
                txs.forEach(t => {
                    if (t.type === 'INCOME') incomeSum += t.amount;
                    else { expenseSum += t.amount;
                        chartAgg[t.primaryCate] = (chartAgg[t.primaryCate] || 0) + t.amount; }
                    const sign = t.type === 'INCOME' ? '+' : '-';
                    const amountCls = t.type === 'INCOME' ? 'INCOME' : 'EXPENSE';
                    const importTag = t.imported ? ' 📥' : '';

                    let remarkHtml = '';

            document.getElementById('netAsset').innerHTML = `¥${totalNet.toFixed(2)}`;

        function renderChart(data) {
            const ctx = document.getElementById('analyticsChart').getContext('2d');
            if (chartInstance) chartInstance.destroy();
            const labels = Object.keys(data);
            if (labels.length === 0) {
                chartInstance = new Chart(ctx, {
                    type: 'doughnut',
                    data: { labels: ['暂无支出'], datasets: [{ data: [1], backgroundColor: ['#e0dbff'] }] },
                    options: { plugins: { legend: { display: false } } }
                });
                return;
            }
            chartInstance = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: labels,
                    datasets: [{
                        data: Object.values(data),
                        backgroundColor: ['#ff9aa2', '#ffb7b2', '#ffdac1', '#c7ceea', '#b5ead7', '#d1b3ff',
                            '#f0b8c6'
                        ],
                        borderWidth: 0,
                        hoverOffset: 8
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: true,
                    plugins: {
                        legend: { position: 'bottom', labels: { font: { size: 10 }, boxWidth: 10, padding: 8 } },
                        tooltip: { bodyFont: { size: 11 }, titleFont: { size: 11 } }
                    }
                }
            });
        }

                else if (name.includes('现金')) displayName = '💰 ' + name;
                else if (name.includes('银行') || name.includes('储蓄') || name.includes('信用') || name.includes('建行') || name
                    .includes('招行') || name.includes('工行') || name.includes('农行') || name.includes('中行') || name
                    .includes('交行')) displayName = '🏦 ' + name;
                else displayName = '🏦 ' + name;
            } else {
                displayName = name;
            }

            if (storage.accounts.find(a => a.name === displayName)) { showToast("账户已存在", true); return; }
            storage.accounts.push({ name: displayName, balance: initBal });
            persist();
            refreshAll();
            document.getElementById('newAccountName').value = '';
            document.getElementById('newAccountInit').value = '';
            showToast(`✅ 添加账户: ${displayName}`);
        };

        window.addPrimaryCategory = function() {
            const type = document.getElementById('configType').value;
            const name = document.getElementById('newPrimaryName').value.trim();
            if (!name) { showToast("请输入分类名称", true); return; }
            if (!storage.categories[type]) storage.categories[type] = {};
            if (storage.categories[type][name]) { showToast("主类已存在", true); return; }
            storage.categories[type][name] = ["默认"];
            persist();
            refreshAll();
            document.getElementById('newPrimaryName').value = '';
            showToast(`✅ 添加分类: ${name}`);
        };

        window.deletePrimaryCategory = function(type, pri) {
            if (confirm(`删除 "${pri}" 整个类别？`)) {
                delete storage.categories[type][pri];
                persist();
                refreshAll();
                showToast(`已删除分类: ${pri}`);
            }
        };

        window.deleteSubCategory = function(type, pri, idx) {
            storage.categories[type][pri].splice(idx, 1);
            if (storage.categories[type][pri].length === 0) storage.categories[type][pri].push("其他");
            persist();
            refreshAll();
            showToast('子类已删除');
        };

        window.addSubCategory = function() {
            const type = document.getElementById('configType').value;
            const pri = document.getElementById('configPrimarySelect').value;
            const subName = document.getElementById('newSubName').value.trim();
            if (!pri || !subName) { showToast("请选择主类并输入子类名称", true); return; }
            if (storage.categories[type][pri].includes(subName)) { showToast("子类已存在", true); return; }
            storage.categories[type][pri].push(subName);
            persist();
            refreshAll();
            document.getElementById('newSubName').value = '';
            showToast(`✅ 添加子类: ${subName}`);
        };

        window.resetDemoData = function() {
            if (confirm("重置会清除所有数据，恢复为默认数据。确定吗？")) {
                storage = {
                    accounts: [
                        { name: "💳 微信支付", balance: 0 },
                        { name: "💳 支付宝", balance: 0 },
                        { name: "🏦 建行储蓄卡", balance: 0 },
                        { name: "💳 招行信用卡", balance: 0 },
                        { name: "🏦 招行储蓄卡", balance: 0 },
                        { name: "💰 现金", balance: 0 },
                        { name: "🏦 其他账户", balance: 0 }
                    ],
                    categories: {
                        EXPENSE: {
                            "🍜 餐饮美食": ["奶茶甜点", "火锅聚餐", "日常三餐"],
                            "🎬 休闲娱乐": ["猫咖撸猫", "电影游戏", "旅游度假"],
                            "🛍️ 购物消费": ["衣服鞋包", "数码产品", "日用品"],
                            "🚗 交通出行": ["打车费", "公交地铁", "加油停车"],
                            "🏠 生活缴费": ["水电燃气", "物业费", "手机话费"]
                        },
                        INCOME: {
                            "💼 工资收入": ["月薪", "奖金", "绩效"],
                            "💼 兼职外快": ["设计稿费", "周末兼职", "副业收入"],
                            "🎁 生活福利": ["红包惊喜", "退税返利", "节日礼金"]
                        }
                    },
                    transactions: [],
                    lastSyncTime: null
                };
                persist();
                refreshAll();
                showToast('🔄 已重置为默认数据');
            }
        };

        window.toggleSyncPanel = function() {
            const panel = document.getElementById('syncPanel');
            panel.style.display = panel.style.display === 'block' ? 'none' : 'block';
            showDeviceInfo();
        };

        document.getElementById('ledgerForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const newTx = {
                id: 'tx_' + Date.now() + '_' + Math.random().toString(36).substr(2, 6),
                type: document.getElementById('txType').value,
                amount: parseFloat(document.getElementById('txAmount').value),
                primaryCate: document.getElementById('txPrimaryCate').value,
                subCate: document.getElementById('txSubCate').value || '日常',
                account: document.getElementById('txAccount').value,
                date: document.getElementById('txDate').value,
                remark: document.getElementById('txRemark').value.trim() || '✨ 桃气笔记',
                createdAt: Date.now(),
            };
            if (isNaN(newTx.amount) || newTx.amount <= 0) { showToast("金额必须是正数", true); return; }
            storage.transactions.unshift(newTx);
            persist();
            refreshAll();
            document.getElementById('txAmount').value = '';
            document.getElementById('txRemark').value = '';
            showToast(`✅ 已记录: ${newTx.type === 'INCOME' ? '+' : '-'}¥${newTx.amount.toFixed(2)}`);
        });

        // ========== GitHub同步 ==========
        function getCloudCfg() { return { user: localStorage.getItem('gh_user') || '', repo: localStorage.getItem(
                    'gh_repo') || '', token: localStorage.getItem('gh_token') || '' }; }

        function saveCloudInputs() {
            localStorage.setItem('gh_user', document.getElementById('ghUser').value.trim());
            localStorage.setItem('gh_repo', document.getElementById('ghRepo').value.trim());
            localStorage.setItem('gh_token', document.getElementById('ghToken').value.trim());
        }

        function loadCloudToInputs() {
            document.getElementById('ghUser').value = localStorage.getItem('gh_user') || '';
            document.getElementById('ghRepo').value = localStorage.getItem('gh_repo') || '';
            document.getElementById('ghToken').value = localStorage.getItem('gh_token') || '';
        }

        async function pushToCloud() {
            saveCloudInputs();
            const cfg = getCloudCfg();
            if (!cfg.user || !cfg.repo || !cfg.token) { showToast("请先填写 GitHub 配置", true); return; }
            const pushBtn = document.getElementById('pushBtn');
            const originalText = pushBtn.innerText;
            pushBtn.innerText = "⏳ 推送中...";
            const url = `https://api.github.com/repos/${cfg.user}/${cfg.repo}/contents/ledger_data.json`;
            const headers = { "Authorization": `token ${cfg.token}`, "Accept": "application/vnd.github.v3+json" };
            try {
                let sha = null;
                const getRes = await fetch(url, { headers });
                if (getRes.ok) { const fileJson = await getRes.json();
                    sha = fileJson.sha; }
                const dataToUpload = { accounts: storage.accounts, categories: storage.categories,
                    transactions: storage.transactions, lastSyncTime: new Date().toISOString(), version: 3 };
                const content = utf8ToBase64(JSON.stringify(dataToUpload, null, 2));
                const putBody = { message: `📱 推送 ${new Date().toLocaleString()}`, content: content, branch: "main" };
                if (sha) putBody.sha = sha;
                const putRes = await fetch(url, { method: "PUT", headers, body: JSON.stringify(putBody) });
                if (putRes.ok) { showToast("✅ 推送成功！"); } else { const error = await putRes.json(); throw new Error(error
                        .message || "上传失败"); }
            } catch (err) { showToast("推送失败：" + err.message, true); } finally { pushBtn.innerText = originalText; }
        }

        async function pullFromCloud() {
            saveCloudInputs();
            const cfg = getCloudCfg();
            if (!cfg.user || !cfg.repo || !cfg.token) { showToast("请先填写 GitHub 配置", true); return; }
            const pullBtn = document.getElementById('pullBtn');
            const originalText = pullBtn.innerText;
            pullBtn.innerText = "⏳ 拉取中...";
            const url = `https://api.github.com/repos/${cfg.user}/${cfg.repo}/contents/ledger_data.json`;
            const headers = { "Authorization": `token ${cfg.token}`, "Accept": "application/vnd.github.v3+json" };
            try {
                const getRes = await fetch(url, { headers });
                if (!getRes.ok) { if (getRes.status === 404) throw new Error("云端还没有数据，请先推送一次"); throw new Error(
                        `HTTP ${getRes.status}`); }
                const fileJson = await getRes.json();
                const cloudData = JSON.parse(base64ToUtf8(fileJson.content));
                if (cloudData.accounts) storage.accounts = cloudData.accounts;
                if (cloudData.categories) storage.categories = cloudData.categories;
                if (cloudData.transactions) storage.transactions = cloudData.transactions;
                persist();
                refreshAll();
                showToast("✅ 拉取成功！");
            } catch (err) { showToast("拉取失败：" + err.message, true); } finally { pullBtn.innerText = originalText; }
        }

        function exportToCSV() {
            if (storage.transactions.length === 0) { showToast("暂无数据可导出", true); return; }
            let csvRows = [
                ["ID", "日期", "类型", "主分类", "子分类", "账户", "金额", "备注"]
            ];
            storage.transactions.forEach(t => {
                const remark = (t.remark || '').replace(/"/g, '""').replace(/\n/g, ' ');
                csvRows.push([t.id, t.date, t.type === 'INCOME' ? '收入' : '支出', t.primaryCate, t.subCate, t.account, t
                    .amount.toFixed(2), remark
                ]);
            });
            const csvContent = csvRows.map(row => row.map(cell => `"${String(cell)}"`).join(",")).join("\n");
            const blob = new Blob(["\uFEFF" + csvContent], { type: "text/csv;charset=utf-8;" });
            const link = document.createElement("a");
            const url = URL.createObjectURL(blob);
            link.href = url;
            link.download = `桃气账本_${new Date().toISOString().slice(0,10)}.csv`;
            link.click();
            URL.revokeObjectURL(url);
            showToast("📥 导出成功");
        }

        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }

        // ========== 页面初始化 ==========
        window.onload = function() {
            document.getElementById('txDate').valueAsDate = new Date();
            loadCloudToInputs();
            refreshAll();
            showDeviceInfo();
            initSpeechRecognition();

            // 提示账户已更新
            setTimeout(() => {
                showToast("✅ 已加载：建行储蓄卡、招行信用卡、招行储蓄卡、其他账户");
            }, 500);

            document.getElementById('voiceBtn').onclick = toggleVoiceRecognition;
            document.getElementById('pushBtn').onclick = pushToCloud;
            document.getElementById('pullBtn').onclick = pullFromCloud;
            document.getElementById('exportBtn').onclick = exportToCSV;
            document.getElementById('resetBtn').onclick = resetDemoData;

            document.getElementById('fileInput').addEventListener('change', function(e) {
                if (this.files && this.files[0]) {
                    importCSV(this.files[0]);
                }
                this.value = '';
            });

            document.getElementById('importBtn').addEventListener('click', function() {
                document.getElementById('fileInput').click();
            });

            document.getElementById('txType').addEventListener('change', () => renderCategoryCascade());
            document.getElementById('txPrimaryCate').addEventListener('change', () => renderSubCascade());
            document.getElementById('configType').addEventListener('change', () => renderConfigList());

            if (window.location.protocol === 'file:') {
                setTimeout(() => {
                    showToast("⚠️ 本地文件无法同步，请部署到服务器", true);
                }, 1000);
            }
        };
    </script>
</body>
