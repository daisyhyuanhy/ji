<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>🔮 桃气紫账本 (严防复活版)</title>
    <style>
        .list-container { max-height: 400px; overflow-y: auto; }
        .item { display: flex; justify-content: space-between; padding: 10px; border-bottom: 1px solid #eee; }
        .del-btn { cursor: pointer; color: red; }
    </style>
</head>
<body>
    <div id="historyList"></div>

<script>
    // 强化版同步逻辑
    async function syncWithGitHub(isSilent = false) {
        const config = { 
            user: localStorage.getItem('gh_user'), 
            repo: localStorage.getItem('gh_repo'), 
            token: localStorage.getItem('gh_token') 
        };
        const url = `https://api.github.com/repos/${config.user}/${config.repo}/contents/ledger_db.json`;
        
        try {
            // 1. 获取云端
            let res = await fetch(url, { headers: { "Authorization": `token ${config.token}`, "Accept": "application/vnd.github.v3+json" }});
            let cloudData = res.ok ? JSON.parse(decodeURIComponent(escape(atob((await res.json()).content)))) : null;

            // 2. 强校验：只保留本地未删除的，且覆盖云端旧数据
            if (cloudData) {
                let txMap = new Map();
                // 先存本地所有数据
                storage.transactions.forEach(t => txMap.set(t.id, t));
                // 对比云端：只有云端记录比本地“更新”时才采用，且永远过滤掉 isDeleted: true
                cloudData.transactions.forEach(t => {
                    if (t.isDeleted) {
                        txMap.delete(t.id); // 云端有删除标记，本地直接删
                    } else if (!txMap.has(t.id) || (t.updatedAt > (txMap.get(t.id).updatedAt || 0))) {
                        txMap.set(t.id, t);
                    }
                });
                storage.transactions = Array.from(txMap.values());
            }

            // 3. 上传（带上最新的 SHA）
            storage.sha = res.ok ? (await res.json()).sha : null;
            await fetch(url, {
                method: "PUT",
                headers: { "Authorization": `token ${config.token}`, "Content-Type": "application/json" },
                body: JSON.stringify({
                    message: "Sync",
                    content: btoa(unescape(encodeURIComponent(JSON.stringify(storage)))),
                    sha: storage.sha
                })
            });
            saveToStorage();
            refreshAllUI();
        } catch(e) { console.error(e); }
    }

    // 强化版删除
    async function deleteTransaction(id) {
        // 1. 标记并本地移除
        let tx = storage.transactions.find(t => t.id === id);
        if(tx) {
            tx.isDeleted = true;
            tx.updatedAt = Date.now();
        }
        storage.transactions = storage.transactions.filter(t => t.id !== id);
        
        saveToStorage();
        refreshAllUI();
        
        // 2. 强制同步：把这个“删除”操作立刻传给 GitHub
        await syncWithGitHub(true);
    }
</script>
</body>
</html>
