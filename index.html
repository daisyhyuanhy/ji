<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>🍑 桃气紫账本 | 云同步灵境版</title>
    <!-- 使用更稳定的 Chart.js CDN -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            transition: all 0.2s ease;
        }

        :root {
            --primary: #7a73b0;
            --primary-light: #f3f2fa;
            --primary-soft: #d3cfe5;
            --expense: #ff9aa2;
            --income: #b5ead7;
            --bg: #e8e7f5;
            --text: #4a4563;
            --card-white: #ffffff;
            --shadow-sm: 0 8px 20px rgba(122, 115, 176, 0.08);
            --border-radius-card: 24px;
            --border-radius-elem: 16px;
        }

        body {
            background: var(--bg);
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, sans-serif;
            padding: 20px 20px 40px;
            color: var(--text);
        }

        .container {
            max-width: 1280px;
            margin: 0 auto;
        }

        /* 头部区域 */
        .header-bar {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 28px;
            gap: 12px;
        }

        h1 {
            margin: 0;
            font-size: 28px;
            background: linear-gradient(135deg, #7a73b0 0%, #9b8bcb 100%);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            font-weight: 800;
            letter-spacing: -0.3px;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .btn-group {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }

        .btn {
            border: none;
            padding: 10px 20px;
            border-radius: 40px;
            font-weight: 700;
            font-size: 13px;
            cursor: pointer;
            background: white;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.03);
            transition: 0.2s;
            font-family: inherit;
        }

        .btn-success {
            background: white;
            border: 1.5px solid var(--primary);
            color: var(--primary);
        }

        .btn-success:hover {
            background: var(--primary);
            color: white;
            transform: translateY(-2px);
        }

        .btn-primary {
            background: var(--primary);
            color: white;
            box-shadow: 0 4px 12px rgba(122, 115, 176, 0.3);
        }

        .btn-primary:hover {
            background: #6861a0;
            transform: translateY(-1px);
        }

        /* 三卡片仪表板 */
        .dashboard {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 20px;
            margin-bottom: 32px;
        }

        .card {
            background: var(--card-white);
            border-radius: var(--border-radius-card);
            padding: 20px 18px;
            box-shadow: var(--shadow-sm);
            text-align: center;
            backdrop-filter: blur(2px);
            border: 1px solid rgba(255,255,255,0.6);
        }

        .card h3 {
            font-size: 13px;
            letter-spacing: 1px;
            color: #928ca9;
            margin-bottom: 8px;
            font-weight: 600;
        }

        .card p {
            font-size: 28px;
            font-weight: 800;
            margin: 0;
        }

        /* 三列网格 */
        .grid-layout {
            display: grid;
            grid-template-columns: 340px 1fr 340px;
            gap: 24px;
        }

        @media (max-width: 1000px) {
            .grid-layout {
                grid-template-columns: 1fr;
                gap: 24px;
            }
        }

        .box {
            background: var(--card-white);
            border-radius: 28px;
            padding: 24px;
            box-shadow: var(--shadow-sm);
            border: 1px solid #ffffffaa;
        }

        h2 {
            font-size: 18px;
            font-weight: 700;
            color: var(--primary);
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
        }

        h2::before {
            content: "🌸";
            font-size: 1.2rem;
            font-weight: normal;
        }

        /* 表单 */
        .form-group {
            margin-bottom: 16px;
        }

        .form-group label {
            font-size: 12px;
            font-weight: 700;
            color: #7f7999;
            display: block;
            margin-bottom: 6px;
        }

        .form-group input, .form-group select {
            width: 100%;
            padding: 12px 14px;
            background: var(--primary-light);
            border: 2px solid transparent;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 500;
            color: var(--text);
            outline: none;
        }

        .form-group input:focus, .form-group select:focus {
            background: white;
            border-color: var(--primary-soft);
        }

        /* 流水列表 */
        .list-container {
            max-height: 380px;
            overflow-y: auto;
            padding-right: 6px;
        }

        .list-container::-webkit-scrollbar {
            width: 5px;
        }

        .list-container::-webkit-scrollbar-track {
            background: #e2def5;
            border-radius: 10px;
        }

        .list-container::-webkit-scrollbar-thumb {
            background: var(--primary-soft);
            border-radius: 10px;
        }

        .item {
            background: var(--primary-light);
            border-radius: 20px;
            padding: 14px;
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            transition: all 0.2s;
            border: 1px solid white;
        }

        .item-left {
            flex: 1;
        }

        .cate-tag {
            background: #e0dbff;
            color: var(--primary);
            font-size: 11px;
            font-weight: 800;
            padding: 4px 12px;
            border-radius: 30px;
            display: inline-block;
            margin-right: 8px;
        }

        .sub-tag {
            background: white;
            padding: 4px 10px;
            border-radius: 30px;
            font-size: 11px;
            font-weight: 600;
            color: #6f698a;
        }

        .meta-info {
            font-size: 11px;
            color: #9c97b8;
            margin-top: 8px;
        }

        .amt {
            font-weight: 800;
            font-size: 18px;
            letter-spacing: -0.2px;
        }

        .amt.EXPENSE {
            color: #e56b73;
        }

        .amt.INCOME {
            color: #2b8f6e;
        }

        .del-icon {
            cursor: pointer;
            font-size: 14px;
            font-weight: 800;
            color: #ff9aa2;
            background: #fff0f0;
            display: inline-block;
            padding: 4px 12px;
            border-radius: 30px;
            margin-top: 6px;
        }

        /* 配置面板 */
        .config-list {
            background: var(--primary-light);
            border-radius: 20px;
            padding: 12px;
            max-height: 140px;
            overflow-y: auto;
            margin-bottom: 16px;
        }

        .config-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 6px;
            border-bottom: 1px dashed #cdc8e0;
            font-weight: 600;
            font-size: 13px;
        }

        .del-btn {
            background: #ffe3e6;
            border-radius: 30px;
            width: 26px;
            height: 26px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: #e56b73;
            font-weight: 800;
        }

        .inline-flex {
            display: flex;
            gap: 8px;
            margin-top: 12px;
        }

        .inline-flex input {
            flex: 1;
        }

        .chart-wrapper {
            background: var(--primary-light);
            border-radius: 24px;
            padding: 15px;
            margin-top: 20px;
        }

        .collapsible-content {
            display: none;
            margin-top: 16px;
        }

        .badge-sync {
            font-size: 11px;
            background: #edeaff;
            border-radius: 20px;
            padding: 4px 12px;
        }

        button {
            background: none;
            border: none;
        }

        .loading {
            opacity: 0.6;
            pointer-events: none;
        }

        .error-msg {
            color: #e56b73;
            font-size: 12px;
            margin-top: 8px;
            text-align: center;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header-bar">
        <h1>🍑 桃气紫账本 · 灵境云迹</h1>
        <div class="btn-group">
            <button class="btn btn-success" id="syncBtn">☁️ 同步云端</button>
            <button class="btn btn-success" id="exportBtn">🌸 导出CSV</button>
        </div>
    </div>

    <div class="dashboard">
        <div class="card"><h3>✨ 总资产净值</h3><p id="netAsset">¥0.00</p></div>
        <div class="card"><h3>💰 收入总额</h3><p id="totalIncome">¥0.00</p></div>
        <div class="card"><h3>💸 支出总额</h3><p id="totalExpense">¥0.00</p></div>
    </div>

    <div class="grid-layout">
        <!-- 左边记账表单 -->
        <div class="box">
            <h2>记一笔小账</h2>
            <form id="ledgerForm">
                <div class="form-group">
                    <label>📌 收支类型</label>
                    <select id="txType">
                        <option value="EXPENSE">🌸 支出</option>
                        <option value="INCOME">💰 收入</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>💰 金额 (¥)</label>
                    <input type="number" id="txAmount" step="0.01" placeholder="0.00" required>
                </div>
                <div class="form-group">
                    <label>📂 一级分类</label>
                    <select id="txPrimaryCate"></select>
                </div>
                <div class="form-group">
                    <label>🏷️ 二级分类</label>
                    <select id="txSubCate"></select>
                </div>
                <div class="form-group">
                    <label>🏦 账户</label>
                    <select id="txAccount"></select>
                </div>
                <div class="form-group">
                    <label>📅 日期</label>
                    <input type="date" id="txDate" required>
                </div>
                <div class="form-group">
                    <label>📝 小树洞</label>
                    <input type="text" id="txRemark" placeholder="今天的小确幸...">
                </div>
                <button type="submit" class="btn btn-primary" style="width:100%">✨ 一键封印 ✨</button>
            </form>
        </div>

        <!-- 中间流水+图表 -->
        <div class="box">
            <h2>📖 流水日记本</h2>
            <div class="list-container" id="historyList"></div>
            <div class="chart-wrapper">
                <canvas id="analyticsChart" height="140"></canvas>
            </div>
        </div>

        <!-- 右侧高级配置 & 云同步 -->
        <div class="box">
            <h2>🏦 账户管家</h2>
            <div class="config-list" id="accountConfigList"></div>
            <div class="inline-flex">
                <input type="text" id="newAccountName" placeholder="新账户名">
                <input type="number" id="newAccountInit" placeholder="初始余额" style="width:80px;">
                <button class="btn btn-primary" onclick="addCustomAccount()" style="padding:0 12px;">+</button>
            </div>

            <h2 style="margin-top: 24px;">🗂️ 自定分类</h2>
            <div class="form-group">
                <select id="configType">
                    <option value="EXPENSE">📉 支出分类</option>
                    <option value="INCOME">📈 收入分类</option>
                </select>
            </div>
            <div class="config-list" id="cateConfigList"></div>
            <div class="inline-flex">
                <input type="text" id="newPrimaryName" placeholder="新主类名">
                <button class="btn btn-primary" onclick="addPrimaryCategory()" style="padding:0 16px;">➕主类</button>
            </div>
            <div class="inline-flex">
                <select id="configPrimarySelect" style="flex:2;"></select>
                <input type="text" id="newSubName" placeholder="子类名称" style="flex:2;">
                <button class="btn btn-primary" onclick="addSubCategory()" style="padding:0 12px;">+子类</button>
            </div>

            <h2 style="margin-top: 24px;" onclick="toggleSyncPanel()">☁️ 多端同步 · 桃气漫游 ⏷</h2>
            <div id="syncPanel" class="collapsible-content">
                <div class="form-group">
                    <label>GitHub 用户名</label>
                    <input type="text" id="ghUser" placeholder="octocat">
                </div>
                <div class="form-group">
                    <label>仓库名</label>
                    <input type="text" id="ghRepo" placeholder="purple-ledger">
                </div>
                <div class="form-group">
                    <label>🔑 Personal Access Token</label>
                    <input type="password" id="ghToken" placeholder="ghp_xxxx">
                </div>
                <p style="font-size: 12px; color:#7a73b0;">💡 设置后自动跨设备同步，桃花运加持数据不丢失</p>
                <div id="syncStatus" class="error-msg"></div>
            </div>
        </div>
    </div>
</div>

<script>
    // ---------- 存储结构 ----------
    let storage = JSON.parse(localStorage.getItem('gh_ledger_data_v2')) || {
        accounts: [
            { name: "微信支付", balance: 0 },
            { name: "支付宝", balance: 0 },
            { name: "现金", balance: 0 }
        ],
        categories: {
            EXPENSE: { 
                "🍜 餐饮美食": ["奶茶甜点", "火锅聚餐"], 
                "🎬 休闲娱乐": ["猫咖撸猫", "电影游戏"] 
            },
            INCOME: { 
                "💼 兼职外快": ["设计稿费", "周末兼职"], 
                "🎁 生活福利": ["红包惊喜", "退税返利"] 
            }
        },
        transactions: [],
        sha: null
    };

    let chartInstance = null;

    // 辅助函数
    function persist() {
        localStorage.setItem('gh_ledger_data_v2', JSON.stringify(storage));
    }

    // 更新账户余额快照
    function recalcAccountBalances() {
        let balanceMap = new Map();
        storage.accounts.forEach(acc => balanceMap.set(acc.name, acc.balance));
        let sortedTx = [...storage.transactions].sort((a,b) => new Date(a.date) - new Date(b.date));
        sortedTx.forEach(t => {
            let curBal = balanceMap.get(t.account);
            if (curBal !== undefined) {
                let delta = t.type === 'INCOME' ? t.amount : -t.amount;
                balanceMap.set(t.account, curBal + delta);
            }
        });
        storage.accounts.forEach(acc => {
            let newBal = balanceMap.get(acc.name);
            if (newBal !== undefined) acc.balance = newBal;
        });
        persist();
    }

    // 全量刷新UI
    function refreshAll() {
        renderAccountSelect();
        renderCategoryCascade();
        renderConfigList();
        renderTransactionsAndDashboard();
    }

    function renderAccountSelect() {
        const select = document.getElementById('txAccount');
        if(select) select.innerHTML = storage.accounts.map(a => `<option value="${escapeHtml(a.name)}">${escapeHtml(a.name)}</option>`).join('');
    }

    function renderCategoryCascade() {
        const type = document.getElementById('txType').value;
        const categories = storage.categories[type] || {};
        const primarySelect = document.getElementById('txPrimaryCate');
        primarySelect.innerHTML = Object.keys(categories).map(p => `<option value="${escapeHtml(p)}">${escapeHtml(p)}</option>`).join('');
        renderSubCascade();
    }

    function renderSubCascade() {
        const type = document.getElementById('txType').value;
        const primary = document.getElementById('txPrimaryCate').value;
        const subList = storage.categories[type]?.[primary] || [];
        const subSelect = document.getElementById('txSubCate');
        subSelect.innerHTML = subList.map(s => `<option value="${escapeHtml(s)}">${escapeHtml(s)}</option>`).join('');
        if(subList.length === 0) subSelect.innerHTML = '<option value="日常">日常</option>';
    }

    function renderConfigList() {
        const accContainer = document.getElementById('accountConfigList');
        accContainer.innerHTML = storage.accounts.map((acc, idx) => `
            <div class="config-item">
                <span>💰 ${escapeHtml(acc.name)}  ¥${acc.balance.toFixed(2)}</span>
                <span class="del-btn" onclick="deleteAccount(${idx})">✖️</span>
            </div>
        `).join('');

        const type = document.getElementById('configType').value;
        const cateData = storage.categories[type];
        let cateHtml = '';
        for (let [pri, subs] of Object.entries(cateData)) {
            cateHtml += `<div style="margin-top:6px; font-weight:800; color:var(--primary);">📁 ${escapeHtml(pri)} <span class="del-btn" style="display:inline-block; margin-left:8px;" onclick="deletePrimaryCategory('${type}','${escapeHtml(pri)}')">🗑️</span></div>`;
            subs.forEach((sub, idx) => {
                cateHtml += `<div class="config-item" style="padding-left:16px;"><span>└ ${escapeHtml(sub)}</span><span class="del-btn" onclick="deleteSubCategory('${type}','${escapeHtml(pri)}',${idx})">✖️</span></div>`;
            });
        }
        document.getElementById('cateConfigList').innerHTML = cateHtml || '<div class="config-item">暂无分类，新增吧～</div>';
        const primarySelect = document.getElementById('configPrimarySelect');
        primarySelect.innerHTML = Object.keys(cateData).map(p => `<option value="${escapeHtml(p)}">${escapeHtml(p)}</option>`).join('');
    }

    function renderTransactionsAndDashboard() {
        let incomeSum = 0, expenseSum = 0;
        let chartAgg = {};
        let html = '';

        recalcAccountBalances();
        let totalNet = storage.accounts.reduce((sum, acc) => sum + acc.balance, 0);
        
        const txs = [...storage.transactions].sort((a,b) => new Date(b.date) - new Date(a.date));
        txs.forEach(t => {
            if(t.type === 'INCOME') incomeSum += t.amount;
            else {
                expenseSum += t.amount;
                chartAgg[t.primaryCate] = (chartAgg[t.primaryCate] || 0) + t.amount;
            }
            const sign = t.type === 'INCOME' ? '+' : '-';
            const amountCls = t.type === 'INCOME' ? 'INCOME' : 'EXPENSE';
            html += `
                <div class="item">
                    <div class="item-left">
                        <div>
                            <span class="cate-tag">${escapeHtml(t.primaryCate)}</span>
                            <span class="sub-tag">${escapeHtml(t.subCate)}</span>
                        </div>
                        <div class="meta-info">📆 ${t.date} · 💳 ${escapeHtml(t.account)} · ✍️ ${escapeHtml(t.remark || '无痕')}</div>
                    </div>
                    <div style="text-align:right;">
                        <div class="amt ${amountCls}">${sign} ¥${t.amount.toFixed(2)}</div>
                        <div class="del-icon" onclick="deleteTransaction('${t.id}')">抹去</div>
                    </div>
                </div>
            `;
        });

        document.getElementById('totalIncome').innerHTML = `¥${incomeSum.toFixed(2)}`;
        document.getElementById('totalExpense').innerHTML = `¥${expenseSum.toFixed(2)}`;
        document.getElementById('netAsset').innerHTML = `¥${totalNet.toFixed(2)}`;
        document.getElementById('historyList').innerHTML = html || '<div style="padding:24px; text-align:center; color:#aaa;">🍃 暂无流水，记一笔开始～</div>';
        renderChart(chartAgg);
    }

    function renderChart(data) {
        const ctx = document.getElementById('analyticsChart').getContext('2d');
        if(chartInstance) chartInstance.destroy();
        const labels = Object.keys(data);
        if(labels.length === 0) {
            chartInstance = new Chart(ctx, { type: 'doughnut', data: { labels: ['暂无支出'], datasets: [{ data: [1], backgroundColor: ['#e0dbff'] }] }, options: { plugins: { legend: { display: false } } } });
            return;
        }
        chartInstance = new Chart(ctx, {
            type: 'doughnut',
            data: { labels: labels, datasets: [{ data: Object.values(data), backgroundColor: ['#ff9aa2', '#ffb7b2', '#ffdac1', '#c7ceea', '#b5ead7', '#d1b3ff'], borderWidth: 0 }] },
            options: { responsive: true, maintainAspectRatio: true, plugins: { legend: { position: 'bottom', labels: { font: { size: 11 } } } } }
        });
    }

    // 增删改逻辑
    window.deleteTransaction = function(id) {
        storage.transactions = storage.transactions.filter(t => t.id !== id);
        persist();
        refreshAll();
        autoSyncBackground();
    };

    window.deleteAccount = function(idx) {
        if(storage.accounts.length <= 1) { alert("至少保留一个可爱的小金库吧 💕"); return; }
        storage.accounts.splice(idx, 1);
        persist();
        refreshAll();
        autoSyncBackground();
    };

    window.addCustomAccount = function() {
        let name = document.getElementById('newAccountName').value.trim();
        let initBal = parseFloat(document.getElementById('newAccountInit').value) || 0;
        if(!name) return;
        if(storage.accounts.find(a => a.name === name)) { alert("账户已存在～"); return; }
        storage.accounts.push({ name: name, balance: initBal });
        persist();
        refreshAll();
        autoSyncBackground();
        document.getElementById('newAccountName').value = '';
        document.getElementById('newAccountInit').value = '';
    };

    window.addPrimaryCategory = function() {
        const type = document.getElementById('configType').value;
        const name = document.getElementById('newPrimaryName').value.trim();
        if(!name) return;
        if(!storage.categories[type]) storage.categories[type] = {};
        if(storage.categories[type][name]) { alert("主类已经存在"); return; }
        storage.categories[type][name] = ["默认"];
        persist();
        refreshAll();
        autoSyncBackground();
        document.getElementById('newPrimaryName').value = '';
    };

    window.deletePrimaryCategory = function(type, pri) {
        if(confirm(`删除 "${pri}" 整个类别？下属流水仍在但分类会显示为"已删除"`)) {
            delete storage.categories[type][pri];
            persist();
            refreshAll();
            autoSyncBackground();
        }
    };

    window.deleteSubCategory = function(type, pri, idx) {
        storage.categories[type][pri].splice(idx, 1);
        if(storage.categories[type][pri].length === 0) storage.categories[type][pri].push("其他");
        persist();
        refreshAll();
        autoSyncBackground();
    };

    window.addSubCategory = function() {
        const type = document.getElementById('configType').value;
        const pri = document.getElementById('configPrimarySelect').value;
        const subName = document.getElementById('newSubName').value.trim();
        if(!pri || !subName) return;
        if(storage.categories[type][pri].includes(subName)) { alert("子类已存在"); return; }
        storage.categories[type][pri].push(subName);
        persist();
        refreshAll();
        autoSyncBackground();
        document.getElementById('newSubName').value = '';
    };

    // 表单提交
    document.getElementById('ledgerForm').addEventListener('submit', (e) => {
        e.preventDefault();
        const newTx = {
            id: 'tx_' + Date.now() + '_' + Math.random().toString(36).substr(2, 6),
            type: document.getElementById('txType').value,
            amount: parseFloat(document.getElementById('txAmount').value),
            primaryCate: document.getElementById('txPrimaryCate').value,
            subCate: document.getElementById('txSubCate').value || '日常',
            account: document.getElementById('txAccount').value,
            date: document.getElementById('txDate').value,
            remark: document.getElementById('txRemark').value || '✨ 桃气笔记',
            updatedAt: Date.now(),
        };
        if(isNaN(newTx.amount) || newTx.amount <= 0) { alert("金额必须是正数噢～"); return; }
        storage.transactions.unshift(newTx);
        persist();
        refreshAll();
        document.getElementById('txAmount').value = '';
        document.getElementById('txRemark').value = '';
        autoSyncBackground();
    });

    // ----- GitHub 同步核心 (增强错误处理)-----
    function getCloudCfg() {

    }

    async function syncWithGitHub(manual = true) {
        const cfg = getCloudCfg();
        const syncBtn = document.getElementById('syncBtn');
        const syncStatus = document.getElementById('syncStatus');
        
        if(!cfg.user || !cfg.repo || !cfg.token) {
            if(manual) {
                alert("请先填写 GitHub 配置 🍑\n\n需要：\n1. GitHub 用户名\n2. 仓库名（需提前创建）\n3. Personal Access Token (需 repo 权限)");
                if(syncStatus) syncStatus.innerText = "⚠️ 请先填写完整的 GitHub 配置";
            }
            return;
        }
        
        if(manual) {
            syncBtn.innerText = "🔄 同步中...";
            if(syncStatus) syncStatus.innerText = "⏳ 正在同步...";
        }
        
        const url = `https://api.github.com/repos/${cfg.user}/${cfg.repo}/contents/ledger_purple_v2.json`;
        const headers = { 
            "Authorization": `token ${cfg.token}`, 
            "Accept": "application/vnd.github.v3+json" 
        };
        
        try {
            // 尝试获取远程文件
            let cloudSha = null;
            let remoteData = null;
            const getRes = await fetch(url, { headers });
            
            if(getRes.status === 404) {
                // 文件不存在，首次同步
                if(manual && syncStatus) syncStatus.innerText = "📝 首次同步，将创建云端文件";
            } else if(getRes.ok) {
                const fileJson = await getRes.json();
                cloudSha = fileJson.sha;
                const content = atob(fileJson.content);
                remoteData = JSON.parse(content);
                
                // 智能合并数据
                if(remoteData && remoteData.transactions) {
                    const localTxMap = new Map(storage.transactions.map(t => [t.id, t]));
                    remoteData.transactions.forEach(rtx => {
                        let local = localTxMap.get(rtx.id);
                        if(!local || (rtx.updatedAt && rtx.updatedAt > (local.updatedAt || 0))) {
                            localTxMap.set(rtx.id, rtx);
                        }
                    });
                    storage.transactions = Array.from(localTxMap.values()).sort((a,b) => new Date(b.date) - new Date(a.date));
                    
                    if(remoteData.accounts) {
                        let accMap = new Map(storage.accounts.map(a=>[a.name,a]));
                        remoteData.accounts.forEach(a=> accMap.set(a.name, a));
                        storage.accounts = Array.from(accMap.values());
                    }
                    if(remoteData.categories) {
                        storage.categories = JSON.parse(JSON.stringify(remoteData.categories));
                    }
                    storage.sha = cloudSha;
                    persist();
                    refreshAll();
                    if(manual && syncStatus) syncStatus.innerText = "✅ 已合并云端数据";
                }
            } else {
                throw new Error(`HTTP ${getRes.status}: ${getRes.statusText}`);
            }
            
            // 上传本地最新数据
            const finalContent = btoa(unescape(encodeURIComponent(JSON.stringify({ 
                accounts: storage.accounts, 
                categories: storage.categories, 
                transactions: storage.transactions, 
                version: 2,
                lastSync: new Date().toISOString()
            }, null, 2))));
            
            const putBody = { 
                message: "🍑 紫气同步 " + new Date().toLocaleString(), 
                content: finalContent,
                branch: "main"
            };
            if(storage.sha) putBody.sha = storage.sha;
            
            const putRes = await fetch(url, { method: "PUT", headers, body: JSON.stringify(putBody) });
            if(putRes.ok) {
                const putJson = await putRes.json();
                storage.sha = putJson.content.sha;
                persist();
                if(manual) {
                    alert("✨ 云朵已收纳，数据同步完成 ✨");
                    if(syncStatus) syncStatus.innerText = "✅ 同步成功！";
                    setTimeout(() => { if(syncStatus) syncStatus.innerText = ""; }, 3000);
                }
            } else {
                const errorText = await putRes.text();
                throw new Error(`上传失败: ${putRes.status} - ${errorText}`);
            }
        } catch(err) {
            console.error('Sync error:', err);
            if(manual) {
                let errorMsg = "网络连接不畅，账目暂时保存在本地缓存中~\n";
                if(err.message.includes("Not Found")) {
                    errorMsg = "仓库不存在或Token权限不足\n请确认：\n1. 仓库已创建\n2. Token 有 repo 权限\n3. 仓库名正确";
                } else if(err.message.includes("401")) {
                    errorMsg = "Token 无效或已过期，请重新生成";
                }
                alert(errorMsg);
                if(syncStatus) syncStatus.innerText = "❌ " + errorMsg.split('\n')[0];
            }
        } finally {
            if(manual) {
                syncBtn.innerText = "☁️ 同步云端";
                setTimeout(() => { if(syncStatus && syncStatus.innerText === "⏳ 正在同步...") syncStatus.innerText = ""; }, 2000);
            }
        }
    }

    function autoSyncBackground() { 
        const cfg = getCloudCfg();
        if(cfg.user && cfg.repo && cfg.token) {
            syncWithGitHub(false).catch(e => console.log("后台同步失败:", e));
        }
    }

    // 辅助转义
    function escapeHtml(str) { 
        if(!str) return ''; 
        return str.replace(/[&<>]/g, function(m){ 
            if(m === '&') return '&amp;'; 
            if(m === '<') return '&lt;'; 
            if(m === '>') return '&gt;'; 
            return m;
        });
    }
