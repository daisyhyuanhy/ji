<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🔮 桃气紫账本 (GitHub云同步修复版)</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --primary: #7a73b0; --primary-light: #f3f2fa; --primary-soft: #d3cfe5; --expense: #ff9aa2; --income: #b5ead7; --bg: #e8e7f5; --text: #4a4563; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--bg); margin: 0; padding: 25px; color: var(--text); }
        .container { max-width: 1100px; margin: 0 auto; }
        .header-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; }
        h1 { margin: 0; font-size: 26px; color: var(--primary); font-weight: 800; }
        .dashboard { display: grid; grid-template-columns: repeat(3, 1fr); gap: 18px; margin-bottom: 25px; }
        .card { background: #ffffff; padding: 20px 15px; border-radius: 16px; box-shadow: 0 8px 20px rgba(122, 115, 176, 0.08); text-align: center; }
        .grid-layout { display: grid; grid-template-columns: 330px 1fr 330px; gap: 25px; }
        @media (max-width: 950px) { .grid-layout { grid-template-columns: 1fr; } }
        .box { background: #ffffff; padding: 22px; border-radius: 16px; box-shadow: 0 8px 20px rgba(122, 115, 176, 0.08); height: fit-content; }
        .btn { border: none; padding: 10px 16px; border-radius: 12px; cursor: pointer; font-weight: 700; background: var(--primary); color: white; }
        .item { display: flex; justify-content: space-between; align-items: center; padding: 12px; background: var(--primary-light); border-radius: 12px; margin-bottom: 10px; }
        .del-btn { color: #ff9aa2; cursor: pointer; font-weight: 800; font-size: 14px; margin-left: 10px; }
        .amt.EXPENSE { color: #e56b73; } .amt.INCOME { color: #43aa8b; }
        .collapsible-content { display: none; }
    </style>
</head>
<body>

<div class="container">
    <div class="header-bar">
        <h1>🔮 缘の账本</h1>
        <button class="btn" id="syncBtn" onclick="syncWithGitHub()">☁️ 同步</button>
    </div>
    <div class="dashboard">
        <div class="card"><h3>净资产</h3><p id="netAsset">¥0.00</p></div>
        <div class="card"><h3>收入</h3><p id="totalIncome">¥0.00</p></div>
        <div class="card"><h3>支出</h3><p id="totalExpense">¥0.00</p></div>
    </div>
    <div class="grid-layout">
        <div class="box">
            <form id="ledgerForm">
                <select id="txType" onchange="renderCategoryCascade()"><option value="EXPENSE">支出</option><option value="INCOME">收入</option></select>
                <input type="number" id="txAmount" placeholder="金额" required>
                <select id="txPrimaryCate" onchange="renderSubCategoryCascade()"></select>
                <select id="txSubCate"></select>
                <input type="date" id="txDate" required>
                <button type="submit" class="btn">保存</button>
            </form>
        </div>
        <div class="box"><div id="historyList" class="list-container"></div></div>
        <div class="box">
            <h2>配置</h2>
            <div id="syncPanel">
                <input type="text" id="ghUser" placeholder="用户名">
                <input type="text" id="ghRepo" placeholder="仓库名">
                <input type="password" id="ghToken" placeholder="Token">
            </div>
        </div>
    </div>
</div>

<script>
    let storage = JSON.parse(localStorage.getItem('gh_ledger_data')) || {
        accounts: [{name: '微信', balance: 0}],
        categories: { EXPENSE: {'饮食': ['奶茶']}, INCOME: {'工资': ['奖金']} },
        transactions: []
    };

    // --- 核心同步逻辑 (合并版) ---
    async function syncWithGitHub(isSilent = false) {
        const user = localStorage.getItem('gh_user');
        const repo = localStorage.getItem('gh_repo');
        const token = localStorage.getItem('gh_token');
        if (!user || !repo || !token) return;

        const url = `https://api.github.com/repos/${user}/${repo}/contents/ledger_db.json`;
        const headers = { "Authorization": `token ${token}`, "Accept": "application/vnd.github.v3+json", "Content-Type": "application/json" };

        try {
            let res = await fetch(url, { headers });
            let sha = res.ok ? (await res.json()).sha : null;
            
            // 简单的合并策略：以本地为主，覆盖上传
            let body = {
                message: "Sync Data",
                content: btoa(unescape(encodeURIComponent(JSON.stringify(storage)))),
                sha: sha
            };
            if (!sha) delete body.sha;

            let putRes = await fetch(url, { method: "PUT", headers, body: JSON.stringify(body) });
            if (putRes.ok) {
                if(!isSilent) alert("同步成功！");
            }
        } catch (e) { console.error(e); }
    }

    // --- 修复后的删除 ---
    async function deleteTransaction(id) {
        storage.transactions = storage.transactions.filter(t => t.id !== id);
        localStorage.setItem('gh_ledger_data', JSON.stringify(storage));
        renderUI();
        await syncWithGitHub(true); // 删除后立刻同步
    }

    function renderUI() {
        document.getElementById('historyList').innerHTML = storage.transactions.map(t => `
            <div class="item">
                <span>${t.primaryCate} ¥${t.amount}</span>
                <span class="del-btn" onclick="deleteTransaction('${t.id}')">×</span>
            </div>
        `).join('');
    }

    document.getElementById('ledgerForm').addEventListener('submit', (e) => {
        e.preventDefault();
        storage.transactions.unshift({
            id: 'T' + Date.now(),
            amount: parseFloat(document.getElementById('txAmount').value),
            primaryCate: document.getElementById('txPrimaryCate').value,
            date: document.getElementById('txDate').value
        });
        localStorage.setItem('gh_ledger_data', JSON.stringify(storage));
        renderUI();
        syncWithGitHub(true);
    });

    renderUI();
</script>
</body>
</html>
