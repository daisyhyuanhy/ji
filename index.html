<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>🍑 桃气紫账本 | 云同步灵境版</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #7a73b0;
            --primary-light: #f3f2fa;
            --primary-soft: #d3cfe5;
            --expense: #ff9aa2;
            --income: #b5ead7;
            --bg: #e8e7f5;
            --text: #4a4563;
            --card-white: #ffffff;
            --shadow-sm: 0 8px 20px rgba(122, 115, 176, 0.08);
        }

        body {
            background: var(--bg);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, sans-serif;
            padding: 20px;
            color: var(--text);
        }

        .container {
            max-width: 1280px;
            margin: 0 auto;
        }

        .header-bar {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 28px;
            gap: 12px;
        }

        h1 {
            margin: 0;
            font-size: 28px;
            background: linear-gradient(135deg, #7a73b0 0%, #9b8bcb 100%);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            font-weight: 800;
        }

        .btn-group {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }

        .btn {
            border: none;
            padding: 10px 20px;
            border-radius: 40px;
            font-weight: 700;
            font-size: 13px;
            cursor: pointer;
            background: white;
            transition: 0.2s;
        }

        .btn-success {
            border: 1.5px solid var(--primary);
            color: var(--primary);
        }

        .btn-success:hover {
            background: var(--primary);
            color: white;
        }

        .btn-primary {
            background: var(--primary);
            color: white;
        }

        .btn-primary:hover {
            background: #6861a0;
        }

        .btn-danger {
            border: 1.5px solid #ff9aa2;
            color: #e56b73;
        }

        .btn-danger:hover {
            background: #ff9aa2;
            color: white;
        }

        .dashboard {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 20px;
            margin-bottom: 32px;
        }

        .card {
            background: var(--card-white);
            border-radius: 24px;
            padding: 20px;
            box-shadow: var(--shadow-sm);
            text-align: center;
        }

        .card h3 {
            font-size: 13px;
            color: #928ca9;
            margin-bottom: 8px;
        }

        .card p {
            font-size: 28px;
            font-weight: 800;
            margin: 0;
        }

        .grid-layout {
            display: grid;
            grid-template-columns: 340px 1fr 340px;
            gap: 24px;
        }

        @media (max-width: 1000px) {
            .grid-layout {
                grid-template-columns: 1fr;
            }
        }

        .box {
            background: var(--card-white);
            border-radius: 28px;
            padding: 24px;
            box-shadow: var(--shadow-sm);
        }

        h2 {
            font-size: 18px;
            font-weight: 700;
            color: var(--primary);
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
        }

        .form-group {
            margin-bottom: 16px;
        }

        .form-group label {
            font-size: 12px;
            font-weight: 700;
            color: #7f7999;
            display: block;
            margin-bottom: 6px;
        }

        .form-group input, .form-group select {
            width: 100%;
            padding: 12px 14px;
            background: var(--primary-light);
            border: 2px solid transparent;
            border-radius: 20px;
            font-size: 14px;
            color: var(--text);
            outline: none;
        }

        .form-group input:focus, .form-group select:focus {
            background: white;
            border-color: var(--primary-soft);
        }

        .list-container {
            max-height: 380px;
            overflow-y: auto;
            padding-right: 6px;
        }

        .item {
            background: var(--primary-light);
            border-radius: 20px;
            padding: 14px;
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
        }

        .cate-tag {
            background: #e0dbff;
            color: var(--primary);
            font-size: 11px;
            font-weight: 800;
            padding: 4px 12px;
            border-radius: 30px;
            display: inline-block;
            margin-right: 8px;
        }

        .sub-tag {
            background: white;
            padding: 4px 10px;
            border-radius: 30px;
            font-size: 11px;
        }

        .meta-info {
            font-size: 11px;
            color: #9c97b8;
            margin-top: 8px;
        }

        .amt {
            font-weight: 800;
            font-size: 18px;
        }

        .amt.EXPENSE {
            color: #e56b73;
        }

        .amt.INCOME {
            color: #2b8f6e;
        }

        .del-icon {
            cursor: pointer;
            font-size: 14px;
            font-weight: 800;
            color: #ff9aa2;
            background: #fff0f0;
            display: inline-block;
            padding: 4px 12px;
            border-radius: 30px;
            margin-top: 6px;
            transition: all 0.2s;
        }

        .del-icon:hover {
            background: #ffe0e0;
            transform: scale(0.95);
        }

        .config-list {
            background: var(--primary-light);
            border-radius: 20px;
            padding: 12px;
            max-height: 140px;
            overflow-y: auto;
            margin-bottom: 16px;
        }

        .config-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 6px;
            border-bottom: 1px dashed #cdc8e0;
            font-weight: 600;
            font-size: 13px;
        }

        .del-btn {
            background: #ffe3e6;
            border-radius: 30px;
            width: 26px;
            height: 26px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: #e56b73;
            font-weight: 800;
        }

        .inline-flex {
            display: flex;
            gap: 8px;
            margin-top: 12px;
        }

        .inline-flex input {
            flex: 1;
        }

        .chart-wrapper {
            background: var(--primary-light);
            border-radius: 24px;
            padding: 15px;
            margin-top: 20px;
        }

        .collapsible-content {
            display: none;
            margin-top: 16px;
        }

        .toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--primary);
            color: white;
            padding: 12px 24px;
            border-radius: 40px;
            font-size: 14px;
            z-index: 1000;
            animation: fadeInOut 2s ease;
        }

        @keyframes fadeInOut {
            0% { opacity: 0; transform: translateX(-50%) translateY(20px); }
            15% { opacity: 1; transform: translateX(-50%) translateY(0); }
            85% { opacity: 1; transform: translateX(-50%) translateY(0); }
            100% { opacity: 0; transform: translateX(-50%) translateY(-20px); }
        }

        .sync-status {
            font-size: 12px;
            margin-top: 10px;
            padding: 8px;
            border-radius: 12px;
            text-align: center;
        }

        .sync-status.success {
            background: #e8f5e9;
            color: #2e7d32;
        }

        .sync-status.error {
            background: #ffebee;
            color: #c62828;
        }

        .sync-status.syncing {
            background: #fff3e0;
            color: #ef6c00;
        }

        .sync-status.info {
            background: #e3f2fd;
            color: #1565c0;
        }

        .device-info {
            background: var(--primary-light);
            border-radius: 16px;
            padding: 12px;
            margin-top: 16px;
            font-size: 11px;
            color: #7f7999;
        }

        .device-info p {
            margin: 4px 0;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header-bar">
        <h1>🍑 桃气紫账本</h1>
        <div class="btn-group">
            <button class="btn btn-success" id="pullBtn">📥 拉取云端</button>
            <button class="btn btn-primary" id="pushBtn">📤 推送云端</button>
            <button class="btn btn-success" id="exportBtn">🌸 导出CSV</button>
            <button class="btn btn-danger" id="resetBtn">🔄 重置数据</button>
        </div>
    </div>

    <div class="dashboard">
        <div class="card"><h3>✨ 总资产净值</h3><p id="netAsset">¥0.00</p></div>
        <div class="card"><h3>💰 收入总额</h3><p id="totalIncome">¥0.00</p></div>
        <div class="card"><h3>💸 支出总额</h3><p id="totalExpense">¥0.00</p></div>
    </div>

    <div class="grid-layout">
        <div class="box">
            <h2>记一笔小账</h2>
            <form id="ledgerForm">
                <div class="form-group">
                    <label>📌 收支类型</label>
                    <select id="txType">
                        <option value="EXPENSE">🌸 支出</option>
                        <option value="INCOME">💰 收入</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>💰 金额 (¥)</label>
                    <input type="number" id="txAmount" step="0.01" placeholder="0.00" required>
                </div>
                <div class="form-group">
                    <label>📂 一级分类</label>
                    <select id="txPrimaryCate"></select>
                </div>
                <div class="form-group">
                    <label>🏷️ 二级分类</label>
                    <select id="txSubCate"></select>
                </div>
                <div class="form-group">
                    <label>🏦 账户</label>
                    <select id="txAccount"></select>
                </div>
                <div class="form-group">
                    <label>📅 日期</label>
                    <input type="date" id="txDate" required>
                </div>
                <div class="form-group">
                    <label>📝 小树洞</label>
                    <input type="text" id="txRemark" placeholder="今天的小确幸...">
                </div>
                <button type="submit" class="btn btn-primary" style="width:100%">✨ 一键封印 ✨</button>
            </form>
        </div>

        <div class="box">
            <h2>📖 流水日记本</h2>
            <div class="list-container" id="historyList"></div>
            <div class="chart-wrapper">
                <canvas id="analyticsChart" height="140"></canvas>
            </div>
        </div>

        <div class="box">
            <h2>🏦 账户管家</h2>
            <div class="config-list" id="accountConfigList"></div>
            <div class="inline-flex">
                <input type="text" id="newAccountName" placeholder="新账户名">
                <input type="number" id="newAccountInit" placeholder="初始余额" style="width:80px;">
                <button class="btn btn-primary" onclick="addCustomAccount()">+</button>
            </div>

            <h2 style="margin-top: 24px;">🗂️ 自定分类</h2>
            <div class="form-group">
                <select id="configType">
                    <option value="EXPENSE">📉 支出分类</option>
                    <option value="INCOME">📈 收入分类</option>
                </select>
            </div>
            <div class="config-list" id="cateConfigList"></div>
            <div class="inline-flex">
                <input type="text" id="newPrimaryName" placeholder="新主类名">
                <button class="btn btn-primary" onclick="addPrimaryCategory()">➕主类</button>
            </div>
            <div class="inline-flex">
                <select id="configPrimarySelect" style="flex:2;"></select>
                <input type="text" id="newSubName" placeholder="子类名称" style="flex:2;">
                <button class="btn btn-primary" onclick="addSubCategory()">+子类</button>
            </div>

            <h2 style="margin-top: 24px;" onclick="toggleSyncPanel()">☁️ GitHub 同步设置 ⏷</h2>
            <div id="syncPanel" class="collapsible-content">
                <div class="form-group">
                    <label>GitHub 用户名</label>
                    <input type="text" id="ghUser" placeholder="octocat">
                </div>
                <div class="form-group">
                    <label>仓库名</label>
                    <input type="text" id="ghRepo" placeholder="purple-ledger">
                </div>
                <div class="form-group">
                    <label>🔑 Personal Access Token</label>
                    <input type="password" id="ghToken" placeholder="ghp_xxxx">
                </div>
                <p style="font-size: 12px; color:#7a73b0;">
                    💡 提示：<br>
                    1. 需要先在GitHub创建仓库<br>
                    2. Token需要勾选repo权限<br>
                    3. 拉取 = 从云端下载（会覆盖本地）<br>
                    4. 推送 = 上传到云端（会覆盖云端）
                </p>
                <div id="syncStatus" class="sync-status"></div>
                
                <!-- 设备信息和诊断 -->
                <div class="device-info" id="deviceInfo">
                    <p>📱 正在检测设备信息...</p>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    // 存储数据
    let storage = JSON.parse(localStorage.getItem('gh_ledger_data_v3')) || {
        accounts: [
            { name: "微信支付", balance: 0 },
            { name: "支付宝", balance: 0 },
            { name: "现金", balance: 0 }
        ],
        categories: {
            EXPENSE: { 
                "🍜 餐饮美食": ["奶茶甜点", "火锅聚餐"], 
                "🎬 休闲娱乐": ["猫咖撸猫", "电影游戏"] 
            },
            INCOME: { 
                "💼 兼职外快": ["设计稿费", "周末兼职"], 
                "🎁 生活福利": ["红包惊喜", "退税返利"] 
            }
        },
        transactions: [],
        lastSyncTime: null
    };

    let chartInstance = null;

    // 显示设备信息
    function showDeviceInfo() {
        const deviceInfo = document.getElementById('deviceInfo');
        const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
        const isLocalFile = window.location.protocol === 'file:';
        const isHttps = window.location.protocol === 'https:';
        
        let infoHtml = `
            <p>📱 设备类型: ${isMobile ? '移动端 (手机/平板)' : 'PC端 (电脑)'}</p>
            <p>🔒 协议: ${window.location.protocol}</p>
            <p>⚠️ 重要提示:</p>
        `;
        
        if (isLocalFile) {
            infoHtml += `<p style="color:#e56b73;">❌ 当前是本地文件打开，无法使用GitHub同步！</p>`;
            infoHtml += `<p>💡 解决方法:</p>`;
            infoHtml += `<p>1. 使用本地服务器打开（如: http://localhost:xxxx）</p>`;
            infoHtml += `<p>2. 或者部署到GitHub Pages、Vercel等在线服务</p>`;
            infoHtml += `<p>3. 手机端必须使用HTTPS或HTTP在线访问，不能直接打开HTML文件</p>`;
        } else if (!isHttps && window.location.hostname !== 'localhost' && !window.location.hostname.includes('127.0.0.1')) {
            infoHtml += `<p style="color:#e56b73;">⚠️ 当前是HTTP协议，某些浏览器可能限制CORS请求</p>`;
            infoHtml += `<p>💡 建议使用HTTPS协议访问</p>`;
        } else {
            infoHtml += `<p style="color:#2e7d32;">✅ 网络环境正常，可以尝试同步</p>`;
        }
        
        infoHtml += `<p>📝 手机端同步失败常见原因:</p>`;
        infoHtml += `<p>• 未配置正确的GitHub Token和仓库名</p>`;
        infoHtml += `<p>• Token权限不足（需要repo权限）</p>`;
        infoHtml += `<p>• 手机网络无法访问GitHub API</p>`;
        infoHtml += `<p>• 跨域资源共享(CORS)限制</p>`;
        
        deviceInfo.innerHTML = infoHtml;
    }

    // 正确的 Base64 编码/解码函数（支持中文）
    function utf8ToBase64(str) {
        try {
            return btoa(encodeURIComponent(str).replace(/%([0-9A-F]{2})/g, function(match, p1) {
                return String.fromCharCode(parseInt(p1, 16));
            }));
        } catch (e) {
            console.error('编码错误:', e);
            return '';
        }
    }

    function base64ToUtf8(base64) {
        try {
            return decodeURIComponent(Array.prototype.map.call(atob(base64), function(c) {
                return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2);
            }).join(''));
        } catch (e) {
            console.error('解码错误:', e);
            return '';
        }
    }

    function showToast(message, isError = false) {
        const toast = document.createElement('div');
        toast.className = 'toast';
        toast.textContent = message;
        toast.style.background = isError ? '#e56b73' : 'var(--primary)';
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 2000);
    }

    function showSyncStatus(message, type) {
        const statusDiv = document.getElementById('syncStatus');
        if (statusDiv) {
            statusDiv.textContent = message;
            statusDiv.className = `sync-status ${type}`;
            setTimeout(() => {
                if (statusDiv.textContent === message) {
                    statusDiv.className = 'sync-status';
                    statusDiv.textContent = '';
                }
            }, 5000);
        }
    }

    function persist() {
        localStorage.setItem('gh_ledger_data_v3', JSON.stringify(storage));
    }

    // 重新计算余额
    function recalcAccountBalances() {
        storage.accounts.forEach(acc => { acc.balance = 0; });
        
        let sortedTx = [...storage.transactions].sort((a, b) => new Date(a.date) - new Date(b.date));
        sortedTx.forEach(t => {
            let account = storage.accounts.find(a => a.name === t.account);
            if (account) {
                if (t.type === 'INCOME') {
                    account.balance += t.amount;
                } else {
                    account.balance -= t.amount;
                }
            }
        });
        persist();
    }

    function refreshAll() {
        renderAccountSelect();
        renderCategoryCascade();
        renderConfigList();
        renderTransactionsAndDashboard();
    }

    function renderAccountSelect() {
        const select = document.getElementById('txAccount');
        if(select) select.innerHTML = storage.accounts.map(a => `<option value="${escapeHtml(a.name)}">${escapeHtml(a.name)}</option>`).join('');
    }

    function renderCategoryCascade() {
        const type = document.getElementById('txType').value;
        const categories = storage.categories[type] || {};
        const primarySelect = document.getElementById('txPrimaryCate');
        primarySelect.innerHTML = Object.keys(categories).map(p => `<option value="${escapeHtml(p)}">${escapeHtml(p)}</option>`).join('');
        renderSubCascade();
    }

    function renderSubCascade() {
        const type = document.getElementById('txType').value;
        const primary = document.getElementById('txPrimaryCate').value;
        const subList = storage.categories[type]?.[primary] || [];
        const subSelect = document.getElementById('txSubCate');
        subSelect.innerHTML = subList.map(s => `<option value="${escapeHtml(s)}">${escapeHtml(s)}</option>`).join('');
        if(subList.length === 0) subSelect.innerHTML = '<option value="日常">日常</option>';
    }

    function renderConfigList() {
        const accContainer = document.getElementById('accountConfigList');
        accContainer.innerHTML = storage.accounts.map((acc, idx) => `
            <div class="config-item">
                <span>💰 ${escapeHtml(acc.name)} ¥${acc.balance.toFixed(2)}</span>
                <span class="del-btn" onclick="deleteAccount(${idx})">✖️</span>
            </div>
        `).join('');

        const type = document.getElementById('configType').value;
        const cateData = storage.categories[type];
        let cateHtml = '';
        for (let [pri, subs] of Object.entries(cateData)) {
            cateHtml += `<div style="margin-top:6px; font-weight:800; color:var(--primary);">📁 ${escapeHtml(pri)} <span class="del-btn" style="display:inline-block; margin-left:8px;" onclick="deletePrimaryCategory('${type}','${escapeHtml(pri)}')">🗑️</span></div>`;
            subs.forEach((sub, idx) => {
                cateHtml += `<div class="config-item" style="padding-left:16px;"><span>└ ${escapeHtml(sub)}</span><span class="del-btn" onclick="deleteSubCategory('${type}','${escapeHtml(pri)}',${idx})">✖️</span></div>`;
            });
        }
        document.getElementById('cateConfigList').innerHTML = cateHtml || '<div class="config-item">暂无分类</div>';
        const primarySelect = document.getElementById('configPrimarySelect');
        primarySelect.innerHTML = Object.keys(cateData).map(p => `<option value="${escapeHtml(p)}">${escapeHtml(p)}</option>`).join('');
    }

    function renderTransactionsAndDashboard() {
        let incomeSum = 0, expenseSum = 0;
        let chartAgg = {};
        let html = '';

        recalcAccountBalances();
        let totalNet = storage.accounts.reduce((sum, acc) => sum + acc.balance, 0);
        
        const txs = [...storage.transactions].sort((a, b) => new Date(b.date) - new Date(a.date));
        txs.forEach(t => {
            if(t.type === 'INCOME') {
                incomeSum += t.amount;
            } else {
                expenseSum += t.amount;
                chartAgg[t.primaryCate] = (chartAgg[t.primaryCate] || 0) + t.amount;
            }
            const sign = t.type === 'INCOME' ? '+' : '-';
            const amountCls = t.type === 'INCOME' ? 'INCOME' : 'EXPENSE';
            html += `
                <div class="item">
                    <div style="flex:1;">
                        <div>
                            <span class="cate-tag">${escapeHtml(t.primaryCate)}</span>
                            <span class="sub-tag">${escapeHtml(t.subCate)}</span>
                        </div>
                        <div class="meta-info">📆 ${t.date} · 💳 ${escapeHtml(t.account)} · ✍️ ${escapeHtml(t.remark || '无痕')}</div>
                    </div>
                    <div style="text-align:right;">
                        <div class="amt ${amountCls}">${sign} ¥${t.amount.toFixed(2)}</div>
                        <div class="del-icon" onclick="deleteTransaction('${t.id}')">🗑️ 抹去</div>
                    </div>
                </div>
            `;
        });

        document.getElementById('totalIncome').innerHTML = `¥${incomeSum.toFixed(2)}`;
        document.getElementById('totalExpense').innerHTML = `¥${expenseSum.toFixed(2)}`;
        document.getElementById('netAsset').innerHTML = `¥${totalNet.toFixed(2)}`;
        document.getElementById('historyList').innerHTML = html || '<div style="padding:24px; text-align:center;">🍃 暂无流水，记一笔吧～</div>';
        renderChart(chartAgg);
    }

    function renderChart(data) {
        const ctx = document.getElementById('analyticsChart').getContext('2d');
        if(chartInstance) chartInstance.destroy();
        const labels = Object.keys(data);
        if(labels.length === 0) {
            chartInstance = new Chart(ctx, { 
                type: 'doughnut', 
                data: { labels: ['暂无支出'], datasets: [{ data: [1], backgroundColor: ['#e0dbff'] }] }, 
                options: { plugins: { legend: { display: false } } } 
            });
            return;
        }
        chartInstance = new Chart(ctx, {
            type: 'doughnut',
            data: { 
                labels: labels, 
                datasets: [{ 
                    data: Object.values(data), 
                    backgroundColor: ['#ff9aa2', '#ffb7b2', '#ffdac1', '#c7ceea', '#b5ead7', '#d1b3ff'], 
                    borderWidth: 0 
                }] 
            },
            options: { responsive: true, maintainAspectRatio: true, plugins: { legend: { position: 'bottom' } } }
        });
    }

    // 删除交易记录
    window.deleteTransaction = function(id) {
        const index = storage.transactions.findIndex(t => t.id === id);
        if (index !== -1) {
            storage.transactions.splice(index, 1);
            persist();
            refreshAll();
            showToast('✨ 记录已删除');
        }
    };

    window.deleteAccount = function(idx) {
        if(storage.accounts.length <= 1) { 
            showToast("至少保留一个账户"); 
            return; 
        }
        storage.accounts.splice(idx, 1);
        persist();
        refreshAll();
        showToast('账户已删除');
    };

    window.addCustomAccount = function() {
        let name = document.getElementById('newAccountName').value.trim();
        let initBal = parseFloat(document.getElementById('newAccountInit').value) || 0;
        if(!name) { showToast("请输入账户名称"); return; }
        if(storage.accounts.find(a => a.name === name)) { showToast("账户已存在"); return; }
        storage.accounts.push({ name: name, balance: initBal });
        persist();
        refreshAll();
        document.getElementById('newAccountName').value = '';
        document.getElementById('newAccountInit').value = '';
        showToast(`✅ 添加账户: ${name}`);
    };

    window.addPrimaryCategory = function() {
        const type = document.getElementById('configType').value;
        const name = document.getElementById('newPrimaryName').value.trim();
        if(!name) { showToast("请输入分类名称"); return; }
        if(!storage.categories[type]) storage.categories[type] = {};
        if(storage.categories[type][name]) { showToast("主类已存在"); return; }
        storage.categories[type][name] = ["默认"];
        persist();
        refreshAll();
        document.getElementById('newPrimaryName').value = '';
        showToast(`✅ 添加分类: ${name}`);
    };

    window.deletePrimaryCategory = function(type, pri) {
        if(confirm(`删除 "${pri}" 整个类别？`)) {
            delete storage.categories[type][pri];
            persist();
            refreshAll();
            showToast(`已删除分类: ${pri}`);
        }
    };

    window.deleteSubCategory = function(type, pri, idx) {
        storage.categories[type][pri].splice(idx, 1);
        if(storage.categories[type][pri].length === 0) storage.categories[type][pri].push("其他");
        persist();
        refreshAll();
        showToast('子类已删除');
    };

    window.addSubCategory = function() {
        const type = document.getElementById('configType').value;
        const pri = document.getElementById('configPrimarySelect').value;
        const subName = document.getElementById('newSubName').value.trim();
        if(!pri || !subName) { showToast("请选择主类并输入子类名称"); return; }
        if(storage.categories[type][pri].includes(subName)) { showToast("子类已存在"); return; }
        storage.categories[type][pri].push(subName);
        persist();
        refreshAll();
        document.getElementById('newSubName').value = '';
        showToast(`✅ 添加子类: ${subName}`);
    };

    window.resetDemoData = function() {
        if(confirm("重置会清除所有数据，恢复为空账本。确定吗？")) {
            storage = {
                accounts: [
                    { name: "微信支付", balance: 0 },
                    { name: "支付宝", balance: 0 },
                    { name: "现金", balance: 0 }
                ],
                categories: {
                    EXPENSE: { 
                        "🍜 餐饮美食": ["奶茶甜点", "火锅聚餐"], 
                        "🎬 休闲娱乐": ["猫咖撸猫", "电影游戏"] 
                    },
                    INCOME: { 
                        "💼 兼职外快": ["设计稿费", "周末兼职"], 
                        "🎁 生活福利": ["红包惊喜", "退税返利"] 
                    }
                },
                transactions: [],
                lastSyncTime: null
            };
            persist();
            refreshAll();
            showToast('🔄 已重置为空账本');
        }
    };

    window.toggleSyncPanel = function() {
        const panel = document.getElementById('syncPanel');
        panel.style.display = panel.style.display === 'block' ? 'none' : 'block';
        // 每次展开时刷新设备信息
        showDeviceInfo();
    };

    // 表单提交
    document.getElementById('ledgerForm').addEventListener('submit', (e) => {
        e.preventDefault();
        const newTx = {
            id: 'tx_' + Date.now() + '_' + Math.random().toString(36).substr(2, 6),
            type: document.getElementById('txType').value,
            amount: parseFloat(document.getElementById('txAmount').value),
            primaryCate: document.getElementById('txPrimaryCate').value,
            subCate: document.getElementById('txSubCate').value || '日常',
            account: document.getElementById('txAccount').value,
            date: document.getElementById('txDate').value,
            remark: document.getElementById('txRemark').value || '✨ 桃气笔记',
            createdAt: Date.now(),
        };
        if(isNaN(newTx.amount) || newTx.amount <= 0) { showToast("金额必须是正数"); return; }
        storage.transactions.unshift(newTx);
        persist();
        refreshAll();
        document.getElementById('txAmount').value = '';
        document.getElementById('txRemark').value = '';
        showToast(`✅ 已记录: ${newTx.type === 'INCOME' ? '+' : '-'}¥${newTx.amount.toFixed(2)}`);
    });

    // GitHub 同步功能
    function getCloudCfg() {
        return {
            user: localStorage.getItem('gh_user') || '',
            repo: localStorage.getItem('gh_repo') || '',
            token: localStorage.getItem('gh_token') || ''
        };
    }

    function saveCloudInputs() {
        localStorage.setItem('gh_user', document.getElementById('ghUser').value.trim());
        localStorage.setItem('gh_repo', document.getElementById('ghRepo').value.trim());
        localStorage.setItem('gh_token', document.getElementById('ghToken').value.trim());
    }

    function loadCloudToInputs() {
        document.getElementById('ghUser').value = localStorage.getItem('gh_user') || '';
        document.getElementById('ghRepo').value = localStorage.getItem('gh_repo') || '';
        document.getElementById('ghToken').value = localStorage.getItem('gh_token') || '';
    }

    // 检查网络和CORS
    async function checkNetwork() {
        try {
            const response = await fetch('https://api.github.com/zen', {
                method: 'GET',
                headers: { 'Accept': 'application/vnd.github.v3+json' }
            });
            if (response.ok) {
                showSyncStatus("✅ 网络正常，可以访问GitHub API", "success");
                return true;
            }
        } catch (e) {
            showSyncStatus("❌ 网络异常，无法访问GitHub API: " + e.message, "error");
            return false;
        }
        return false;
    }

    // 推送：将本地数据上传到云端
    async function pushToCloud() {
        saveCloudInputs();
        const cfg = getCloudCfg();
        if(!cfg.user || !cfg.repo || !cfg.token) {
            showToast("请先填写 GitHub 配置", true);
            showSyncStatus("请先填写 GitHub 用户名、仓库名和Token", "error");
            return;
        }
        
        // 先检查网络
        const networkOk = await checkNetwork();
        if (!networkOk && window.location.protocol === 'file:') {
            showToast("本地文件无法同步，请部署到服务器", true);
            return;
        }
        
        const pushBtn = document.getElementById('pushBtn');
        const originalText = pushBtn.innerText;
        pushBtn.innerText = "⏳ 推送中...";
        showSyncStatus("正在推送本地数据到云端...", "syncing");
        
        const url = `https://api.github.com/repos/${cfg.user}/${cfg.repo}/contents/ledger_data.json`;
        const headers = { 
            "Authorization": `token ${cfg.token}`, 
            "Accept": "application/vnd.github.v3+json" 
        };
        
        try {
            // 先获取当前文件的sha
            let sha = null;
            const getRes = await fetch(url, { headers });
            if (getRes.ok) {
                const fileJson = await getRes.json();
                sha = fileJson.sha;
            } else if (getRes.status !== 404) {
                throw new Error(`获取文件信息失败: ${getRes.status}`);
            }
            
            // 准备要上传的数据
            const dataToUpload = {
                accounts: storage.accounts,
                categories: storage.categories,
                transactions: storage.transactions,
                lastSyncTime: new Date().toISOString(),
                version: 3
            };
            
            const jsonStr = JSON.stringify(dataToUpload, null, 2);
            const content = utf8ToBase64(jsonStr);
            
            const putBody = { 
                message: `📱 从${/Mobile/i.test(navigator.userAgent) ? '手机' : '电脑'}推送数据 ${new Date().toLocaleString()}`, 
                content: content,
                branch: "main"
            };
            if (sha) putBody.sha = sha;
            
            const putRes = await fetch(url, { method: "PUT", headers, body: JSON.stringify(putBody) });
            if (putRes.ok) {
                storage.lastSyncTime = new Date().toISOString();
                persist();
                showToast("✅ 推送成功！云端已更新");
                showSyncStatus("推送成功！数据已保存到GitHub", "success");
            } else {
                const error = await putRes.json();
                throw new Error(error.message || "上传失败");
            }
        } catch(err) {
            console.error('Push error:', err);
            let errorMsg = err.message;
            if (err.message.includes('CORS')) {
                errorMsg = 'CORS错误：请确保通过HTTPS访问，或部署到GitHub Pages';
            } else if (err.message.includes('Bad credentials')) {
                errorMsg = 'Token无效，请检查是否正确';
            }
            showToast("推送失败：" + errorMsg, true);
            showSyncStatus("推送失败：" + errorMsg, "error");
        } finally {
            pushBtn.innerText = originalText;
        }
    }

    // 拉取：从云端下载数据
    async function pullFromCloud() {
        saveCloudInputs();
        const cfg = getCloudCfg();
        if(!cfg.user || !cfg.repo || !cfg.token) {
            showToast("请先填写 GitHub 配置", true);
            showSyncStatus("请先填写 GitHub 用户名、仓库名和Token", "error");
            return;
        }
        
        // 先检查网络
        const networkOk = await checkNetwork();
        if (!networkOk && window.location.protocol === 'file:') {
            showToast("本地文件无法同步，请部署到服务器", true);
            return;
        }
        
        const pullBtn = document.getElementById('pullBtn');
        const originalText = pullBtn.innerText;
        pullBtn.innerText = "⏳ 拉取中...";
        showSyncStatus("正在从云端拉取数据...", "syncing");
        
        const url = `https://api.github.com/repos/${cfg.user}/${cfg.repo}/contents/ledger_data.json`;
        const headers = { 
            "Authorization": `token ${cfg.token}`, 
            "Accept": "application/vnd.github.v3+json" 
        };
        
        try {
            const getRes = await fetch(url, { headers });
            if (!getRes.ok) {
                if (getRes.status === 404) {
                    throw new Error("云端还没有数据，请先在任意设备上推送一次");
                }
                throw new Error(`HTTP ${getRes.status}: ${getRes.statusText}`);
            }
            
            const fileJson = await getRes.json();
            const jsonStr = base64ToUtf8(fileJson.content);
            const cloudData = JSON.parse(jsonStr);
            
            // 用云端数据覆盖本地
            if (cloudData.accounts) storage.accounts = cloudData.accounts;
            if (cloudData.categories) storage.categories = cloudData.categories;
            if (cloudData.transactions) storage.transactions = cloudData.transactions;
            storage.lastSyncTime = cloudData.lastSyncTime || new Date().toISOString();
            
            persist();
            refreshAll();
            showToast("✅ 拉取成功！已同步云端数据");
            showSyncStatus(`拉取成功！共 ${storage.transactions.length} 条记录`, "success");
        } catch(err) {
            console.error('Pull error:', err);
            let errorMsg = err.message;
            if (err.message.includes('CORS')) {
                errorMsg = 'CORS错误：请确保通过HTTPS访问，或部署到GitHub Pages';
            }
            showToast("拉取失败：" + errorMsg, true);
            showSyncStatus("拉取失败：" + errorMsg, "error");
        } finally {
            pullBtn.innerText = originalText;
        }
    }

    function exportToCSV() {
        if(storage.transactions.length === 0) { 
            showToast("暂无数据可导出"); 
            return; 
        }
        let csvRows = [["ID","日期","类型","主分类","子分类","账户","金额","备注"]];
        storage.transactions.forEach(t => {
            csvRows.push([t.id, t.date, t.type === 'INCOME' ? '收入' : '支出', t.primaryCate, t.subCate, t.account, t.amount.toFixed(2), t.remark]);
        });
        const csvContent = csvRows.map(row => row.map(cell => `"${String(cell).replace(/"/g, '""')}"`).join(",")).join("\n");
        const blob = new Blob(["\uFEFF" + csvContent], {type: "text/csv;charset=utf-8;"});
        const link = document.createElement("a");
        const url = URL.createObjectURL(blob);
        link.href = url;
        link.download = `桃气账本_${new Date().toISOString().slice(0,10)}.csv`;
        link.click();
        URL.revokeObjectURL(url);
        showToast("📥 导出成功");
    }

    function escapeHtml(str) { 
        if(!str) return ''; 
        return str.replace(/[&<>]/g, function(m){ 
            if(m === '&') return '&amp;'; 
            if(m === '<') return '&lt;'; 
            if(m === '>') return '&gt;'; 
            return m;
        });
    }

    // 页面初始化
    window.onload = function() {
        document.getElementById('txDate').valueAsDate = new Date();
        loadCloudToInputs();
        refreshAll();
        showDeviceInfo();
        
        document.getElementById('pushBtn').onclick = pushToCloud;
        document.getElementById('pullBtn').onclick = pullFromCloud;
        document.getElementById('exportBtn').onclick = exportToCSV;
        document.getElementById('resetBtn').onclick = resetDemoData;
        document.getElementById('txType').addEventListener('change', () => renderCategoryCascade());
        document.getElementById('txPrimaryCate').addEventListener('change', () => renderSubCascade());
        document.getElementById('configType').addEventListener('change', () => renderConfigList());
        
        // 如果是从本地文件打开，显示警告
        if (window.location.protocol === 'file:') {
            setTimeout(() => {
                showToast("⚠️ 当前是本地文件，无法使用GitHub同步功能！请部署到服务器", true);
            }, 1000);
        }
    };
</script>
